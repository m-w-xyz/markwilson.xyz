<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/gif" href="assets/img/favicon-1.gif">
  <title>Mark Wilson</title>
  <style>
    :root {
      /* Fallback: approximate midpoint-based alignment */
      --content-left: calc(50vw + 5px);
    }

    /* Base */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font: 18px Arial, sans-serif;
      height: 100vh;
      overflow: hidden; /* Page itself doesn't scroll; right column scrolls instead */
    }

    /* 12-column grid: 10px margins, 10px gutters */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      margin: 0 10px;
      max-width: 100%;
    }

    /* Fixed nav — match homepage */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      padding: 10px 10px 10px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav .name {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }
    @media (hover: hover) {
      .nav .name:hover { font-style: italic; }
      .nav-links a:hover { font-style: italic; }
    }
    .nav-links {
      display: flex;
      flex: 0 0 50vw;
      width: 50vw;
      justify-content: space-between;
      align-items: center;
    }
    .nav-links a {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }

    /* Page transition: content gently fades and slides, nav stays fixed */
    main {
      padding-top: 20vh;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(24px);
      transition:
        transform 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
        opacity 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    main.page-entered {
      opacity: 1;
      transform: translateY(0);
    }
    main.page-exiting {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* Fixed media panel — bottom-left of viewport, 5 columns wide, flush left (no grid margin) */
    .media-panel {
      position: fixed;
      left: 0;
      bottom: 0;
      width: calc(100vw * 5 / 12);
      max-width: calc(100vw * 5 / 12);
      height: calc(100vh - 20vh);
      z-index: 1;
      overflow: hidden;
    }
    .media-panel .media-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 400ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    .media-panel.media-panel--exiting .media-wrap {
      opacity: 0;
    }
    .media-panel.media-panel--fade-in .media-wrap {
      opacity: 0;
    }
    .media-panel.media-panel--entered .media-wrap {
      opacity: 1;
    }
    .media-panel .media-wrap > img,
    .media-panel .media-wrap > video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .media-panel .media-wrap > iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      border: 0;
      transform-origin: center center;
    }
    .media-panel .media-placeholder {
      font-size: 14px;
      color: rgba(0, 0, 0, 0.3);
    }
    .media-panel .media-stack {
      position: absolute;
      inset: 0;
      display: none;
    }
    .media-panel .media-stack.media-stack--visible {
      display: block;
    }
    .media-panel .media-item {
      position: absolute;
      inset: 0;
      opacity: 0;
      z-index: 0;
      pointer-events: none;
    }
    .media-panel .media-item.media-item--active {
      opacity: 1;
      z-index: 1;
      pointer-events: auto;
    }
    .media-panel .media-item > img,
    .media-panel .media-item > video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .media-panel .media-item > iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      border: 0;
      transform-origin: center center;
      /* scale() set via JS per video from its dimensions for object-fit:cover behaviour */
    }

    /* Projects index: 7th column, span half viewport (6 columns) */
    .projects-index {
      grid-column: 1 / -1;
      position: relative;
      z-index: 2;
      padding-bottom: 2em;
      /* Space so list starts below fixed filter (filter height ≈ 29px + 10vh) */
      padding-top: calc(39px + 10vh);
      /* Align content with the "Projects" nav label */
      padding-left: calc(var(--content-left) - 10px);
      /* Scrollbar lives inside this column instead of the page */
      height: calc(100vh - 20vh); /* match media panel height */
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .projects-index::-webkit-scrollbar {
      display: none;
    }

    /* Veil between nav and filter: list must not be visible in this band */
    .filter-veil {
      position: fixed;
      top: 0;
      left: var(--content-left);
      right: 10px;
      height: calc(20vh + 10px);
      background: #fff;
      z-index: 40;
      pointer-events: none;
    }

    /* Filter bar — fixed, top-aligned with media panel; list scrolls under it */
    .filter-bar {
      position: fixed;
      top: calc(20vh + 10px);
      left: var(--content-left);
      right: 10px;
      z-index: 50;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      flex-wrap: nowrap;
      gap: 10px;
      margin-bottom: 0;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
      background: #fff;
      transform: translateY(24px);
      opacity: 0;
      transition: transform 500ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
                  opacity 500ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    .filter-bar.filter-entered {
      transform: translateY(0);
      opacity: 1;
    }
    .filter-bar.filter-exiting {
      opacity: 0;
      transform: translateY(-8px);
    }
    .filter-bar .filter-label {
      font-size: 14px;
      color: rgba(0, 0, 0, 0.5);
    }
    .filter-bar .filter-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
    }
    .filter-bar .filter-links a {
      display: flex;
      color: #000;
      text-decoration: none;
      font: 18px Arial, sans-serif;
    }
    .filter-bar .filter-links .category-count {
      font-size: 12px;
      line-height: 1;
      color: rgba(0, 0, 0, 0.4);
      font-style: normal;
      margin-left: 2px;
    }
    .filter-bar .filter-links a.active {
      font-style: italic;
    }
    @media (hover: hover) {
      .filter-bar .filter-links a:hover { font-style: italic; }
    }
    .filter-bar .filter-count {
      font-size: 12px;
      color: rgba(0, 0, 0, 0.4);
      margin-left: 0px;
    }

    /* Project list */
    .project-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    /* Each project entry: 10px spacing, divider with 10px above and below */
    .project-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
      text-align: left;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      animation: project-entry-in 400ms cubic-bezier(0.74, 0.22, 0.31, 0.87) forwards;
    }
    .project-entry:nth-child(1) { animation-delay: 50ms; }
    .project-entry:nth-child(2) { animation-delay: 90ms; }
    .project-entry:nth-child(3) { animation-delay: 130ms; }
    .project-entry:nth-child(4) { animation-delay: 170ms; }
    .project-entry:nth-child(5) { animation-delay: 210ms; }
    .project-entry:nth-child(6) { animation-delay: 250ms; }
    .project-entry:nth-child(7) { animation-delay: 290ms; }
    .project-entry:nth-child(8) { animation-delay: 330ms; }
    .project-entry:nth-child(9) { animation-delay: 370ms; }
    .project-entry:nth-child(10) { animation-delay: 410ms; }
    .project-entry:nth-child(n+11) { animation-delay: 450ms; }
    @keyframes project-entry-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .project-entry:last-child {
      border-bottom: none;
    }
    @media (hover: hover) {
      .project-entry:hover {
        background: rgba(0, 0, 0, 0.03);
      }
      .project-entry:hover .project-view-link {
        opacity: 1;
      }
    }
    .project-entry.locked {
      background: rgba(0, 0, 0, 0.06);
    }
    .project-entry .project-title {
      font: 18px Arial, sans-serif;
      margin: 0;
      font-weight: normal;
    }
    .project-entry .project-meta {
      display: flex;
      gap: 10px;
      font-size: 12px;
      opacity: 0.4;
      margin: 0;
      line-height: 1.4;
      justify-content: flex-start;
      align-items: flex-start;
      height: fit-content;
    }
    .project-entry .project-meta .studio {
      display: block;
      margin-bottom: 0px;
    }
    .project-entry .project-meta .categories {
      display: block;
      height: fit-content;
    }
    .project-entry .project-view-link {
      margin-left: auto;
      flex-shrink: 0;
      pointer-events: none;
      opacity: 0;
    }

    .projects-status {
      font-size: 14px;
      color: rgba(0, 0, 0, 0.6);
    }

    /* Mobile: single column, full-width media/list, touch-friendly, no hover-only UI */
    @media (max-width: 768px) {
      body { overflow: auto; height: auto; min-height: 100vh; }
      .nav { padding: 12px 10px; }
      .nav-links {
        flex: 0 0 auto;
        width: auto;
        gap: 20px;
      }
      .nav .name,
      .nav-links a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
      main { padding-top: 16px; min-height: auto; }
      :root { --content-left: 10px; }
      .media-panel {
        position: relative;
        width: 100%;
        max-width: 100%;
        height: 50vh;
        min-height: 200px;
      }
      .filter-veil { display: none; }
      .filter-bar {
        position: relative;
        top: auto;
        left: 10px;
        right: 10px;
        margin: 0 10px 10px;
      }
      .projects-index {
        position: relative;
        padding-top: 0;
        padding-left: 10px;
        padding-right: 10px;
        padding-bottom: 2em;
        height: auto;
        overflow-y: visible;
      }
      .project-entry {
        min-height: 44px;
        align-items: center;
      }
      .project-entry .project-view-link {
        opacity: 1;
        pointer-events: auto;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <a href="/" class="name">Mark Wilson</a>
    <nav class="nav-links">
      <a href="projects.html">Projects</a>
      <a href="info.html">Info</a>
      <a href="tools.html">Tools</a>
    </nav>
  </header>

  <!-- Fixed bottom-left: image or video for selected project -->
  <div class="media-panel media-panel--fade-in" id="mediaPanel" aria-hidden="true">
    <div class="media-wrap">
      <div class="media-placeholder" id="mediaPlaceholder"></div>
    </div>
  </div>

  <!-- Filter bar: fixed to viewport, top-aligned with media panel (outside main so transform doesn’t affect it) -->
  <div class="filter-veil" aria-hidden="true"></div>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
    <div class="filter-links" id="filterLinks"></div>
  </div>

  <main id="page-main">
    <div class="grid">
      <div class="projects-index">
        <p class="projects-status" id="projectsStatus">Loading projects…</p>
        <ul class="project-list" id="projectList"></ul>
      </div>
    </div>
  </main>

  <script src="projects.embed.js"></script>
  <script>
    (function () {
      var SANITY_PROJECT_ID = 'k9k1qhrl';
      var SANITY_DATASET = 'production';

      function sanityImageUrl(url, opts) {
        if (!url || typeof url !== 'string') return url;
        if (url.indexOf('cdn.sanity.io') === -1) return url;
        var params = new URLSearchParams();
        if (opts && opts.w) params.set('w', String(opts.w));
        if (opts && opts.h) params.set('h', String(opts.h));
        if (opts && opts.q) params.set('q', String(opts.q));
        if (opts && opts.fit) params.set('fit', opts.fit);
        params.set('auto', 'format');
        return url + (url.indexOf('?') >= 0 ? '&' : '?') + params.toString();
      }

      const CATEGORY_MAP = {
        // Motion
        motion: 'motion design',
        Motion: 'motion design',
        'Motion Design': 'motion design',
        'motion design': 'motion design',
        // 3D
        '3D': '3D rendering',
        '3d': '3D rendering',
        '3D Rendering': '3D rendering',
        '3D rendering': '3D rendering',
        // Programming
        programming: 'programming',
        Programming: 'programming',
        'programming': 'programming',
        // Brand identity / design
        design: 'brand identity',
        Design: 'brand identity',
        'Brand Identity': 'brand identity',
        'brand identity': 'brand identity',
        // Type design
        'type design': 'type design',
        'Type Design': 'type design',
        // Web dev
        'web development': 'web development',
        'Web Development': 'web development',
      };

      function shuffleArray(arr) {
        var copy = arr.slice();
        for (var i = copy.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = copy[i];
          copy[i] = copy[j];
          copy[j] = t;
        }
        return copy;
      }

      function normalizeCategories(raw) {
        if (!Array.isArray(raw)) return [];
        const seen = new Set();
        const out = [];
        raw.forEach(function (c) {
          if (!c) return;
          var key = String(c);
          var mapped = CATEGORY_MAP[key] || CATEGORY_MAP[key.toLowerCase()];
          if (!mapped) return;
          if (!seen.has(mapped)) {
            seen.add(mapped);
            out.push(mapped);
          }
        });
        return out;
      }

      function normalizeProject(doc) {
        // When using the prebuilt embed (`projects.embed.js`), documents are already
        // normalized and expose `media` / `mediaType`. Detect that shape first so
        // we don't accidentally strip media by re-normalizing from missing fields.
        var hasEmbeddedMedia = ('media' in doc) || ('mediaType' in doc) || ('isVimeoEmbed' in doc);
        var project;

        if (hasEmbeddedMedia) {
          project = {
            title: doc.title || '',
            studio: doc.studio || '',
            link: doc.link || '',
            categories: normalizeCategories(doc.categories),
            media: doc.media || null,
            mediaType: doc.mediaType || 'image',
            isVimeoEmbed: !!doc.isVimeoEmbed,
          };
        } else {
          var img = doc.mediaImageUrl || null;
          var fileVid = doc.mediaVideoUrl || null;
          var vimeoId = doc.vimeoId || null;
          var vid = vimeoId ? ('https://player.vimeo.com/video/' + vimeoId) : fileVid;
          var isVideo = doc.mediaType === 'video' && vid;
          project = {
            title: doc.title || '',
            studio: doc.studio || '',
            link: doc.link || '',
            categories: normalizeCategories(doc.categories),
            media: isVideo ? vid : (img || vid),
            mediaType: isVideo ? 'video' : 'image',
            isVimeoEmbed: !!vimeoId,
          };
        }

        return project;
      }

      function loadProjects(callback) {
        function deliver(list) {
          var normalized = list.map(normalizeProject);
          var shuffled = shuffleArray(normalized);
          callback(shuffled);
          fetchVimeoDimensionsForProjects(shuffled, function () {
            if (typeof updateActiveVimeoScale === 'function') updateActiveVimeoScale();
          });
        }
        if (typeof window.__SANITY_PROJECTS === 'object' && window.__SANITY_PROJECTS && window.__SANITY_PROJECTS.length > 0) {
          deliver(window.__SANITY_PROJECTS);
          return;
        }
        var query = '*[_type == "project"]{ title, studio, link, categories, mediaType, "mediaImageUrl": mediaImage.asset->url, "mediaVideoUrl": mediaVideo.asset->url, "vimeoId": coalesce(vimeoVideo.id, vimeoVideo.vimeoData.id) }';
        var apiHost = 'https://' + SANITY_PROJECT_ID + '.api.sanity.io';
        var cdnHost = 'https://' + SANITY_PROJECT_ID + '.apicdn.sanity.io';
        var path = '/v2024-01-01/data/query/' + SANITY_DATASET;
        var params = '?query=' + encodeURIComponent(query) + '&perspective=published';

        function tryFetch(baseUrl, onDone) {
          fetch(baseUrl + path + params, { method: 'GET', mode: 'cors', credentials: 'omit' })
            .then(function (r) {
              if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
              return r.json();
            })
            .then(function (body) {
              if (body.error) throw new Error(body.error.description || JSON.stringify(body.error));
              var list = body.result;
              if (!Array.isArray(list)) throw new Error('Invalid response');
              onDone(null, list);
            })
            .catch(function (err) {
              onDone(err, null);
            });
        }

        tryFetch(cdnHost, function (err, list) {
          if (err) {
            tryFetch(apiHost, function (err2, list2) {
              if (err2 || !list2 || list2.length === 0) {
                callback([]);
                return;
              }
              deliver(list2);
            });
            return;
          }
          if (!list || list.length === 0) {
            callback([]);
            return;
          }
          deliver(list);
        });
      }

      var FILTERS = [
        { value: null, label: 'All' },
        { value: 'brand identity', label: 'Brand Identity' },
        { value: 'motion design', label: 'Motion Design' },
        { value: '3D rendering', label: '3D Rendering' },
        { value: 'programming', label: 'Programming' },
      ];

      // First project to show for each applied filter (by exact title match)
      var FIRST_PROJECT_BY_FILTER = {
        'all': 'The Way Is Māori',
        'brand identity': 'Simfuni',
        'motion design': 'Village Green',
        '3D rendering': 'Toki',
        'programming': 'Track Face',
      };

      var allProjects = [];
      var activeFilter = null;
      var lockedProject = null;

      function getVisibleProjects() {
        var list = !activeFilter
          ? allProjects.slice()
          : allProjects.filter(function (p) {
              return (p.categories || []).indexOf(activeFilter) !== -1;
            });
        var filterKey = activeFilter === null ? 'all' : activeFilter;
        var firstTitle = FIRST_PROJECT_BY_FILTER[filterKey];
        if (!firstTitle || list.length === 0) return list;
        var idx = list.findIndex(function (p) { return (p.title || '') === firstTitle; });
        if (idx <= 0) return list;
        var first = list[idx];
        list.splice(idx, 1);
        list.unshift(first);
        return list;
      }

      function computeCategoryCounts() {
        var counts = {};
        allProjects.forEach(function (p) {
          (p.categories || []).forEach(function (c) {
            if (!counts[c]) counts[c] = 0;
            counts[c] += 1;
          });
        });
        return counts;
      }

      // Always hide all Vimeo UI: no overlay, controls, badge, or logo.
      // controls=0 = chromeless; background=1 = full hide (paid). Append with & if URL already has ? (e.g. unlisted h=).
      var VIMEO_EMBED_PARAMS = 'controls=0&background=1&title=0&byline=0&portrait=0&badge=0&vimeo_logo=0&autoplay=1&loop=1&muted=1';
      function vimeoEmbedUrl(baseUrl) {
        var sep = (baseUrl && baseUrl.indexOf('?') >= 0) ? '&' : '?';
        return baseUrl + sep + VIMEO_EMBED_PARAMS;
      }

      function vimeoIdFromUrl(url) {
        if (!url || typeof url !== 'string') return null;
        var m = url.match(/vimeo\.com\/video\/(\d+)/) || url.match(/vimeo\.com\/(\d+)/);
        return m ? m[1] : null;
      }

      var vimeoDimensionsCache = {};
      function getVimeoDimensions(vimeoId, callback) {
        if (!vimeoId) { callback(16, 9); return; }
        if (vimeoDimensionsCache[vimeoId]) {
          var d = vimeoDimensionsCache[vimeoId];
          callback(d.width, d.height);
          return;
        }
        var url = 'https://vimeo.com/api/oembed.json?url=https://vimeo.com/' + encodeURIComponent(vimeoId);
        fetch(url, { method: 'GET', mode: 'cors' })
          .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error(r.status)); })
          .then(function (data) {
            var w = (data && data.width) ? Number(data.width) : 16;
            var h = (data && data.height) ? Number(data.height) : 9;
            if (!w || !h) { w = 16; h = 9; }
            vimeoDimensionsCache[vimeoId] = { width: w, height: h };
            callback(w, h);
          })
          .catch(function () {
            callback(16, 9);
          });
      }

      function coverScale(containerW, containerH, videoW, videoH) {
        if (!containerW || !containerH || !videoW || !videoH) return 1;
        var scaleByHeight = (containerH * videoW) / (containerW * videoH);
        var scaleByWidth = (containerW * videoH) / (containerH * videoW);
        return Math.max(scaleByHeight, scaleByWidth);
      }

      function applyVimeoCover(iframe, wrap) {
        if (!iframe || !wrap) return;
        var cw = wrap.offsetWidth;
        var ch = wrap.offsetHeight;
        if (!cw || !ch) return;
        var mediaUrl = iframe.getAttribute('data-media-url');
        var project = allProjects.filter(function (p) { return p && p.media === mediaUrl; })[0];
        var vw = 16;
        var vh = 9;
        if (project && project.mediaWidth && project.mediaHeight) {
          vw = project.mediaWidth;
          vh = project.mediaHeight;
        } else if (mediaUrl) {
          var id = vimeoIdFromUrl(mediaUrl);
          var cached = vimeoDimensionsCache[id];
          if (cached) {
            vw = cached.width;
            vh = cached.height;
          }
        }
        var s = coverScale(cw, ch, vw, vh);
        if (project && (project.title || '').trim() === 'Interactive Typer') {
          s *= 1.02;
        }
        iframe.style.transform = 'scale(' + s + ')';
      }

      function updateActiveVimeoScale() {
        var wrap = document.querySelector('.media-panel .media-wrap');
        var active = wrap && wrap.querySelector('.media-item.media-item--active');
        var iframe = active && active.querySelector('iframe');
        if (iframe && wrap) applyVimeoCover(iframe, wrap);
      }

      function fetchVimeoDimensionsForProjects(projects, callback) {
        var idsToFetch = {};
        projects.forEach(function (p) {
          if (!p || !p.isVimeoEmbed || !p.media) return;
          var id = vimeoIdFromUrl(p.media);
          if (id) idsToFetch[id] = true;
        });
        var ids = Object.keys(idsToFetch);
        if (ids.length === 0) {
          callback(projects);
          return;
        }
        var pending = ids.length;
        ids.forEach(function (id) {
          getVimeoDimensions(id, function (w, h) {
            projects.forEach(function (p) {
              if (p && p.isVimeoEmbed && p.media && vimeoIdFromUrl(p.media) === id) {
                p.mediaWidth = w;
                p.mediaHeight = h;
              }
            });
            pending--;
            if (pending === 0) callback(projects);
          });
        });
      }

      var placeholderEl = document.getElementById('mediaPlaceholder');
      var mediaStackEl = null;
      var mediaItemByUrl = {};

      function buildMediaStack() {
        var wrap = document.querySelector('.media-panel .media-wrap');
        if (!wrap) return;
        mediaStackEl = document.createElement('div');
        mediaStackEl.className = 'media-stack';
        allProjects.forEach(function (p) {
          if (!p.media) return;
          var item = document.createElement('div');
          item.className = 'media-item';
          var isVideo = p.mediaType === 'video';
          if (isVideo && p.isVimeoEmbed) {
            var iframe = document.createElement('iframe');
            iframe.src = vimeoEmbedUrl(p.media);
            iframe.setAttribute('data-media-url', p.media);
            iframe.allow = 'autoplay; fullscreen; picture-in-picture';
            iframe.allowFullscreen = true;
            iframe.setAttribute('aria-hidden', 'true');
            item.appendChild(iframe);
          } else if (isVideo) {
            var video = document.createElement('video');
            video.src = p.media;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.autoplay = true;
            video.setAttribute('aria-hidden', 'true');
            item.appendChild(video);
          } else {
            var img = document.createElement('img');
            img.src = sanityImageUrl(p.media, { w: 1200, fit: 'max', q: 90 });
            img.alt = '';
            img.setAttribute('aria-hidden', 'true');
            item.appendChild(img);
          }
          mediaItemByUrl[p.media] = item;
          mediaStackEl.appendChild(item);
        });
        wrap.appendChild(mediaStackEl);
      }

      function setMedia(project) {
        try {
          sessionStorage.setItem('projectsCurrentProjectTitle', project && project.title ? project.title : '');
        } catch (e) {}
        if (!mediaStackEl) {
          if (!project || !project.media) {
            placeholderEl.textContent = '';
            placeholderEl.style.display = 'block';
            document.getElementById('mediaPanel').setAttribute('aria-hidden', 'true');
          } else {
            placeholderEl.style.display = 'none';
            document.getElementById('mediaPanel').setAttribute('aria-hidden', 'false');
          }
          return;
        }
        if (!project || !project.media) {
          placeholderEl.textContent = '';
          placeholderEl.style.display = 'block';
          mediaStackEl.classList.remove('media-stack--visible');
          mediaStackEl.querySelectorAll('.media-item--active').forEach(function (el) { el.classList.remove('media-item--active'); });
          document.getElementById('mediaPanel').setAttribute('aria-hidden', 'true');
          return;
        }
        placeholderEl.style.display = 'none';
        mediaStackEl.classList.add('media-stack--visible');
        mediaStackEl.querySelectorAll('.media-item--active').forEach(function (el) { el.classList.remove('media-item--active'); });
        var item = mediaItemByUrl[project.media];
        if (item) item.classList.add('media-item--active');
        document.getElementById('mediaPanel').setAttribute('aria-hidden', 'false');
        requestAnimationFrame(function () { updateActiveVimeoScale(); });
      }

      var mediaWrapEl = document.querySelector('.media-panel .media-wrap');
      if (mediaWrapEl && typeof ResizeObserver !== 'undefined') {
        var ro = new ResizeObserver(function () { updateActiveVimeoScale(); });
        ro.observe(mediaWrapEl);
      }

      function renderFilters() {
        var linksEl = document.getElementById('filterLinks');
        var visible = getVisibleProjects();
        var counts = computeCategoryCounts();
        var totalCount = allProjects.length;
        var html = '';
        FILTERS.forEach(function (f) {
          var v = f.value === null ? '' : f.value;
          var isActive = (activeFilter === null && f.value === null) || activeFilter === f.value;
          var countHtml = '';
          if (f.value === null) {
            countHtml = '<span class="category-count">' + String(totalCount) + '</span>';
          } else {
            var n = counts[f.value] || 0;
            countHtml = '<span class="category-count">' + String(n) + '</span>';
          }
          html += '<a href="#" class="filter-link' + (isActive ? ' active' : '') + '" data-filter="' + v.replace(/"/g, '&quot;') + '">' + f.label + countHtml + '</a>';
        });
        linksEl.innerHTML = html;
        linksEl.querySelectorAll('.filter-link').forEach(function (a) {
          a.addEventListener('click', function (e) {
            e.preventDefault();
            var v = a.getAttribute('data-filter') || '';
            activeFilter = v === '' ? null : v;
            lockedProject = null;
            renderFilters();
            renderList();
            setMedia(getVisibleProjects()[0] || null);
          });
        });
      }

      function renderList() {
        var listEl = document.getElementById('projectList');
        var statusEl = document.getElementById('projectsStatus');
        var visible = getVisibleProjects();
        statusEl.style.display = visible.length ? 'none' : 'block';
        if (visible.length === 0) {
          statusEl.textContent = activeFilter ? 'No projects in this category.' : 'No projects in Sanity yet. Add and publish projects in Studio.';
          listEl.innerHTML = '';
          lockedProject = null;
          setMedia(null);
          return;
        }
        statusEl.textContent = '';
        function toTitleCase(s) {
          return (s || '').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
        }
        listEl.innerHTML = visible.map(function (p, i) {
          var title = (p.title || 'Untitled').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          var studio = (p.studio || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          var catLabels = (p.categories || []).map(toTitleCase);
          var cats = catLabels.join(', ');
          var hasLink = p.link && (p.link + '').trim() !== '';
          var viewLinkHtml = hasLink ? '<span class="project-view-link">View →</span>' : '';
          return (
            '<li class="project-entry" data-index="' + i + '">' +
              '<div class="project-title">' + title + '</div>' +
              '<div class="project-meta">' +
                (studio ? '<span class="studio">' + studio + '</span>' : '') +
                (cats ? '<span class="categories">' + cats + '</span>' : '') +
                viewLinkHtml +
              '</div>' +
            '</li>'
          );
        }).join('');
        listEl.querySelectorAll('.project-entry').forEach(function (li, i) {
          li.addEventListener('mouseenter', function () {
            if (lockedProject) return;
            setMedia(visible[i]);
          });
          li.addEventListener('mouseleave', function () {
            if (lockedProject) return;
            setMedia(getVisibleProjects()[0] || null);
          });
          li.addEventListener('click', function () {
            var project = visible[i];
            var link = project.link && (project.link + '').trim();
            if (link) {
              window.open(link, '_blank', 'noopener,noreferrer');
              return;
            }
            if (lockedProject === project) {
              lockedProject = null;
              listEl.querySelectorAll('.project-entry').forEach(function (el) {
                el.classList.remove('locked');
              });
              setMedia(getVisibleProjects()[0] || null);
            } else {
              lockedProject = project;
              listEl.querySelectorAll('.project-entry').forEach(function (el) {
                el.classList.toggle('locked', el === li);
              });
              setMedia(project);
            }
          });
        });
      }

      function initProjects() {
        loadProjects(function (projects) {
          allProjects = projects;
          document.getElementById('projectsStatus').textContent = projects.length ? '' : 'No projects in Sanity yet. Add and publish projects in Studio.';
          renderFilters();
          renderList();
          if (projects.length > 0) {
            buildMediaStack();
            setMedia(getVisibleProjects()[0] || null);
          }
        });
      }

      // Entry + filter animation — media panel starts with --fade-in (opacity 0) in HTML
      var mediaPanel = document.getElementById('mediaPanel');
      var fromInfo = false;
      try {
        fromInfo = !!sessionStorage.getItem('projectsFromInfo');
        if (fromInfo) sessionStorage.removeItem('projectsFromInfo');
      } catch (e) {}

      if (mediaPanel && fromInfo) {
        mediaPanel.classList.remove('media-panel--fade-in');
        mediaPanel.classList.add('media-panel--entered');
      }

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var main = document.getElementById('page-main');
          var filterBar = document.getElementById('filterBar');
          var projectsNavLink = document.querySelector('.nav-links a[href="projects.html"]');
          if (main) {
            main.classList.add('page-entered');
          }
          if (filterBar) {
            filterBar.classList.add('filter-entered');
          }
          if (projectsNavLink) {
            var rect = projectsNavLink.getBoundingClientRect();
            document.documentElement.style.setProperty('--content-left', rect.left + 'px');
          }
          if (mediaPanel && !fromInfo) {
            mediaPanel.classList.add('media-panel--entered');
            mediaPanel.classList.remove('media-panel--fade-in');
          }
          window.scrollTo(0, 0);
        });
      });

      window.addEventListener('resize', function () {
        var projectsNavLink = document.querySelector('.nav-links a[href="projects.html"]');
        if (!projectsNavLink) return;
        var rect = projectsNavLink.getBoundingClientRect();
        document.documentElement.style.setProperty('--content-left', rect.left + 'px');
      });

      // Gentle fade/slide out on internal nav clicks
      (function () {
        var main = document.getElementById('page-main');
        if (!main) return;

        function handleNavClick(event) {
          var filterBar = document.getElementById('filterBar');
          var mediaPanel = document.getElementById('mediaPanel');
          var link = event.currentTarget;
          var href = link.getAttribute('href');
          if (!href || href.indexOf('#') === 0 || link.target === '_blank') {
            return;
          }

          event.preventDefault();
          if (main.classList.contains('page-exiting')) return;

          // Fade out the media panel when going to Home or Tools, or when going to Info without "The Way Is Māori" selected
          var dest = (href || '').replace(/^\//, '').split('?')[0].replace(/\/$/, '') || 'index.html';
          var isHome = dest === '' || dest === 'index.html';
          var isTools = dest === 'tools.html' || dest === 'tools';
          var isInfo = dest === 'info.html';
          var currentTitle = (sessionStorage.getItem('projectsCurrentProjectTitle') || '').trim();
          var normalized = currentTitle.toLowerCase().replace(/\u0101/g, 'a').replace(/\u012B/g, 'i');
          var isWayIsMaori = (normalized === 'the way is maori');
          var shouldFadeOut = isHome || isTools || (isInfo && !isWayIsMaori);
          if (mediaPanel && shouldFadeOut) {
            mediaPanel.classList.add('media-panel--exiting');
          }

          main.classList.remove('page-entered');
          main.classList.add('page-exiting');
          if (filterBar) {
            filterBar.classList.remove('filter-entered');
            filterBar.classList.add('filter-exiting');
          }

          setTimeout(function () {
            if (isInfo) {
              try { sessionStorage.setItem('infoFrom', 'projects'); } catch (e) {}
            }
            window.location.href = href;
          }, 500);
        }

        var navLinks = document.querySelectorAll('.nav a');
        navLinks.forEach(function (link) {
          link.addEventListener('click', handleNavClick);
        });
      })();

      initProjects();
      window.scrollTo(0, 0);
    })();
  </script>
</body>
</html>
