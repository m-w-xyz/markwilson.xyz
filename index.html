<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/gif" href="assets/img/favicon-1.gif">
  <title>Mark Wilson</title>
  <style>
    /* Base */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font: 18px Arial, sans-serif;
    }

    /* 12-column grid: 10px margins, 10px gutters */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      margin: 0 10px;
      max-width: 100%;
    }

    /* Fixed nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      padding: 10px 10px 10px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav .name {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }
    @media (hover: hover) {
      .nav .name:hover { font-style: italic; }
      .nav-links a:hover { font-style: italic; }
    }
    .nav-links {
      display: none;
      flex: 0 0 50vw;
      width: 50vw;
      justify-content: space-between;
      align-items: center;
    }
    .nav-links a {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }
    @media (min-width: 769px) {
      .nav-links { display: flex; }
      .mobile-menu-toggle { display: none !important; }
    }

    /* Mobile menu toggle (hamburger) */
    .mobile-menu-toggle {
      position: relative;
      width: 32px;
      height: 24px;
      margin-left: 10px;
      padding: 0;
      border: none;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-menu-toggle-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #000;
      border-radius: 999px;
      transition:
        transform 200ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
        opacity 200ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    .mobile-menu-toggle-line:first-child {
      top: 7px;
    }
    .mobile-menu-toggle-line:last-child {
      bottom: 7px;
    }
    .mobile-menu-toggle.is-open .mobile-menu-toggle-line:first-child {
      transform: translateY(5px) rotate(45deg);
    }
    .mobile-menu-toggle.is-open .mobile-menu-toggle-line:last-child {
      transform: translateY(-5px) rotate(-45deg);
    }

    /* Mobile menu panel */
    .mobile-menu {
      position: fixed;
      inset: 0;
      background: #fff;
      transform: translateY(100%);
      transition: transform 260ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
      z-index: 90; /* sit beneath fixed nav so name + X stay visible */
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      pointer-events: none;
    }
    .mobile-menu.is-open {
      transform: translateY(0);
      pointer-events: auto;
    }
    .mobile-menu-nav {
      margin: 0 0 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .mobile-menu-nav a {
      font: 48px Arial, sans-serif;
      text-decoration: none;
      color: #000;
      line-height: 1;
      margin-bottom: 16px;
    }
    @media (hover: hover) {
      .mobile-menu-nav a:hover {
        font-style: italic;
      }
    }

    /* Page transition: content gently fades and slides, nav stays fixed */
    main {
      padding-top: 3em;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(24px);
      transition:
        transform 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
        opacity 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    main.page-entered {
      opacity: 1;
      transform: translateY(0);
    }
    main.page-exiting {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* Cursor trail canvas — below nav so nav stays clickable */
    #cursor-trail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
    }

    /* Mobile: no hover, touch-friendly nav, single-column */
    @media (max-width: 768px) {
      .nav { padding: 12px 10px; }
      .nav .name {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
      main { padding-top: 20vh; }
      .grid { margin: 0 10px; }
      .mobile-nav-leaving main,
      .mobile-nav-leaving #cursor-trail { visibility: hidden; }
    }
  </style>
</head>
<body>
  <canvas id="cursor-trail" width="10" height="10" aria-hidden="true"></canvas>
  <header class="nav">
    <a href="/index.html" class="name">Mark Wilson</a>
    <nav class="nav-links">
      <a href="/projects.html">Projects</a>
      <a href="/info.html">Info</a>
      <a href="/tools.html">Tools</a>
    </nav>
    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
      <span class="mobile-menu-toggle-line"></span>
      <span class="mobile-menu-toggle-line"></span>
    </button>
  </header>

  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <nav class="mobile-menu-nav">
      <a href="/projects.html">Projects</a>
      <a href="/info.html">Info</a>
      <a href="/tools.html">Tools</a>
    </nav>
  </div>

  <main id="page-main">
    <div class="grid">
      <!-- Content will go here; grid is 12 columns, 10px margins, 10px gutters -->
    </div>
  </main>

  <script>
    (function () {
      var main = document.getElementById('page-main');
      if (!main) return;

      var fromMobileMenu = false;
      try {
        fromMobileMenu = !!sessionStorage.getItem('mobileMenuNav');
        sessionStorage.removeItem('mobileMenuNav');
      } catch (e) {}
      var isMobileEntry = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
      var entryDelay = (fromMobileMenu && isMobileEntry) ? 300 : 0;

      setTimeout(function () {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            main.classList.add('page-entered');
            window.scrollTo(0, 0);
          });
        });
      }, entryDelay);

      // Gentle fade/slide out on internal nav clicks
      function handleNavClick(event) {
        var link = event.currentTarget;
        var href = link.getAttribute('href');
        if (!href || href.indexOf('#') === 0 || link.target === '_blank') {
          return;
        }

        event.preventDefault();
        if (main.classList.contains('page-exiting')) return;

        if (typeof window.stopCursorTrailDrawing === 'function') {
          window.stopCursorTrailDrawing();
        }

        main.classList.remove('page-entered');
        main.classList.add('page-exiting');

        setTimeout(function () {
          if (href && href.indexOf('info') !== -1) {
            try { sessionStorage.setItem('infoFrom', 'home'); } catch (e) {}
          }
          window.location.href = href;
        }, 650);
      }

      var navLinks = document.querySelectorAll('.nav a');
      navLinks.forEach(function (link) {
        link.addEventListener('click', handleNavClick);
      });
    })();
  </script>
  <script>
    (function () {
      var toggle = document.getElementById('mobileMenuToggle');
      var menu = document.getElementById('mobileMenu');
      if (!toggle || !menu) return;

      function isMobile() {
        return window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
      }

      function closeMenu() {
        toggle.classList.remove('is-open');
        menu.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
        menu.setAttribute('aria-hidden', 'true');
      }

      toggle.addEventListener('click', function (event) {
        if (!isMobile()) return;
        event.preventDefault();
        var willOpen = !toggle.classList.contains('is-open');
        toggle.classList.toggle('is-open', willOpen);
        menu.classList.toggle('is-open', willOpen);
        toggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        menu.setAttribute('aria-hidden', willOpen ? 'false' : 'true');
      });

      menu.addEventListener('click', function (event) {
        var target = event.target;
        if (target && target.tagName === 'A') {
          var href = target.getAttribute('href');
          if (!href) return;
          event.preventDefault();
          if (typeof window.stopCursorTrailDrawing === 'function') {
            window.stopCursorTrailDrawing();
          }
          document.documentElement.classList.add('mobile-nav-leaving');
          closeMenu();
          try { sessionStorage.setItem('mobileMenuNav', '1'); } catch (e) {}
          setTimeout(function () {
            window.location.href = href;
          }, 220);
        }
      });

      window.addEventListener('resize', function () {
        if (!isMobile()) {
          closeMenu();
        }
      });
    })();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('cursor-trail');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var trail = [];
      var displayTrail = [];  // smoothed positions for drawing; tip stays at cursor
      var maxTrail = 4000;
      var lastX = -1, lastY = -1;
      var minDist = 2;
      var SMOOTH = 0.17;  // 0 = no easing, higher = snappier (0.1–0.2 = smooth follow)

      // Shrink / inertia state
      var isMouseDown = false;
      var shrinkOffset = 0;        // how many points from the start are "eaten"
      var shrinkVelocity = 0;      // points per second
      var SHRINK_ACCEL = 260;      // acceleration while mouse is held (very responsive)
      var SHRINK_FRICTION = 85;    // gentler deceleration when released (more inertia)
      var MAX_SHRINK_VELOCITY = 520;
      var wasMouseDown = false;    // track mouse state across frames
      var lastTime = null;
      var navShrinkActive = false;
      var navShrinkStart = 0;
      var NAV_SHRINK_DURATION = 600; // ms

      // 3D rotation & zoom
      var angleX = 0;
      var angleY = 0;
      var BASE_SPEED_X = 0.08;   // rad/s slow drift (calmer)
      var BASE_SPEED_Y = 0.05;
      var FOCAL = 1200;          // base perspective focal length (px)

      // Zoom (now fixed; scroll does nothing)
      var zoom = 0;

      var drawingEnabled = true;

      window.stopCursorTrailDrawing = function () {
        // Disable adding new points, but keep the existing trail
        // so the nav-triggered shrink animation can play out.
        drawingEnabled = false;
      };

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }

      var cssW = function () { return window.innerWidth; };
      var cssH = function () { return window.innerHeight; };

      // Project trail points into 3D: the line actually extends into depth.
      // Oldest points are farthest in Z, newest point is at Z=0.
      // Rotation is around the viewport center so motion is completely independent of cursor position.
      function projectTrail3D(points) {
        if (points.length < 2) return points;
        var cursorPt = points[points.length - 1];
        var cx = cssW() / 2;
        var cy = cssH() / 2;
        var cosX = Math.cos(angleX);
        var sinX = Math.sin(angleX);
        var cosY = Math.cos(angleY);
        var sinY = Math.sin(angleY);
        var depthRange = 800; // how deep the line goes into the screen
        var baseFocal = FOCAL * (1 + zoom);
        var focal = FOCAL;
        var out = [];
        var n = points.length;
        for (var i = 0; i < n; i++) {
          var dx = points[i].x - cx;
          var dy = points[i].y - cy;
          // Give the line real depth: oldest point has largest |z|
          var t = n <= 1 ? 0 : (i - (n - 1)) / (n - 1); // 0 at cursor, -1 at oldest
          var z0 = t * depthRange;

          // 3D: (dx, dy, z0). Apply R_x then R_y.
          var x1 = dx;
          var y1 = dy * cosX - z0 * sinX;
          var z1 = dy * sinX + z0 * cosX;
          var x2 = x1 * cosY + z1 * sinY;
          var y2 = y1;
          var z2 = -x1 * sinY + z1 * cosY;
          var scale = focal / (focal + z2);
          out.push({
            x: cx + x2 * scale,
            y: cy + y2 * scale
          });
        }
        // Translate so the tip of the line (last point) sits exactly at the cursor.
        var lastProj = out[out.length - 1];
        var dxAlign = cursorPt.x - lastProj.x;
        var dyAlign = cursorPt.y - lastProj.y;
        for (var j = 0; j < out.length; j++) {
          out[j].x += dxAlign;
          out[j].y += dyAlign;
        }
        return out;
      }

      function drawPath(points) {
        if (points.length < 2) return;
        ctx.clearRect(0, 0, cssW(), cssH());
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();

        // Smooth the path with quadratic curves to reduce visible corners
        ctx.moveTo(points[0].x, points[0].y);
        for (var i = 1; i < points.length - 1; i++) {
          var cx = points[i].x;
          var cy = points[i].y;
          var mx = (points[i].x + points[i + 1].x) / 2;
          var my = (points[i].y + points[i + 1].y) / 2;
          ctx.quadraticCurveTo(cx, cy, mx, my);
        }
        // Ensure the path reaches the final point
        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
        ctx.stroke();
      }

      function animationLoop(timestamp) {
        if (lastTime == null) lastTime = timestamp;
        var dt = (timestamp - lastTime) / 1000; // seconds
        lastTime = timestamp;

        if (navShrinkActive && trail.length > 1) {
          // Shrink current visible line over 600ms from the far (non-cursor) end
          var progress = (timestamp - navShrinkStart) / NAV_SHRINK_DURATION;
          if (progress >= 1) {
            navShrinkActive = false;
            trail.length = 0;
            displayTrail.length = 0;
            shrinkOffset = 0;
            ctx.clearRect(0, 0, cssW(), cssH());
          } else {
            var visibleCount = Math.max(0, Math.ceil((1 - progress) * trail.length));
            if (visibleCount >= 2) {
              var start = Math.max(0, trail.length - visibleCount);
              var trailSlice = trail.slice(start);
              var displaySlice = displayTrail.slice(start);
              if (displaySlice.length !== trailSlice.length) displaySlice = trailSlice.slice();
              drawPath(projectTrail3D(displaySlice));
            } else {
              ctx.clearRect(0, 0, cssW(), cssH());
            }
          }
          } else {
            // 3D rotation: base slow drift only
            angleX += BASE_SPEED_X * dt;
            angleY += BASE_SPEED_Y * dt;

            // Ease display trail toward actual trail; tip stays locked to cursor
            if (trail.length >= 2 && lastX >= 0 && lastY >= 0) {
              while (displayTrail.length < trail.length) {
                var idx = displayTrail.length;
                displayTrail.push({ x: trail[idx].x, y: trail[idx].y });
              }
              if (displayTrail.length > trail.length) {
                displayTrail.length = trail.length;
              }
              for (var i = 0; i < displayTrail.length; i++) {
                if (i === displayTrail.length - 1) {
                  displayTrail[i].x = lastX;
                  displayTrail[i].y = lastY;
                } else {
                  displayTrail[i].x += (trail[i].x - displayTrail[i].x) * SMOOTH;
                  displayTrail[i].y += (trail[i].y - displayTrail[i].y) * SMOOTH;
                }
              }
            }

            // Always render the full current trail (no progressive head-eating)
            if (trail.length < 2) {
              ctx.clearRect(0, 0, cssW(), cssH());
            } else {
              drawPath(projectTrail3D(displayTrail));
            }
          }

        wasMouseDown = isMouseDown;
        requestAnimationFrame(animationLoop);
      }

      window.addEventListener('resize', resize);
      resize();

      document.addEventListener('mousemove', function (e) {
        if (!drawingEnabled) return;
        var x = e.clientX, y = e.clientY;
        var dist = lastX < 0 ? minDist + 1 : Math.hypot(x - lastX, y - lastY);
        if (dist >= minDist) {
          trail.push({ x: x, y: y });
          if (trail.length > maxTrail) trail.shift();
          lastX = x;
          lastY = y;
        }
      });

      document.addEventListener('mousedown', function (e) {
        if (e.button === 0) {
          lastX = -1;
          isMouseDown = true;
        }
      });

      document.addEventListener('mouseup', function (e) {
        if (e.button === 0) {
          isMouseDown = false;
        }
      });

      // Touch: tap-and-drag to draw on mobile (canvas has pointer-events: none so we listen on document)
      var activeTouchId = null;
      document.addEventListener('touchstart', function (e) {
        if (e.changedTouches.length === 0) return;
        var t = e.changedTouches[0];
        activeTouchId = t.identifier;
        lastX = -1;
      }, { passive: true });
      document.addEventListener('touchmove', function (e) {
        if (!drawingEnabled) return;
        if (activeTouchId == null) return;
        var touch = null;
        for (var i = 0; i < e.touches.length; i++) {
          if (e.touches[i].identifier === activeTouchId) {
            touch = e.touches[i];
            break;
          }
        }
        if (!touch) return;
        var x = touch.clientX, y = touch.clientY;
        e.preventDefault();
        var dist = lastX < 0 ? minDist + 1 : Math.hypot(x - lastX, y - lastY);
        if (dist >= minDist) {
          trail.push({ x: x, y: y });
          if (trail.length > maxTrail) trail.shift();
          lastX = x;
          lastY = y;
        }
      }, { passive: false });
      document.addEventListener('touchend', function (e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeTouchId) {
            activeTouchId = null;
            break;
          }
        }
      }, { passive: true });
      document.addEventListener('touchcancel', function (e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === activeTouchId) {
            activeTouchId = null;
            break;
          }
        }
      }, { passive: true });

      // Scroll intentionally does nothing for the trail now
      document.addEventListener('wheel', function () {
        // no-op
      }, { passive: true });

      // Shrink visible line on nav click over 600ms (keep current visible segment, don't show full trail)
      var navLinksForTrail = document.querySelectorAll('.nav a');
      navLinksForTrail.forEach(function (link) {
        link.addEventListener('click', function () {
          var startIdx = Math.floor(shrinkOffset);
          if (startIdx < 0) startIdx = 0;
          var visible = trail.slice(startIdx);
          if (visible.length > 1) {
            trail = visible;
            displayTrail = visible.slice();
            shrinkOffset = 0;
            shrinkVelocity = 0;
            navShrinkActive = true;
            navShrinkStart = performance.now();
          }
        });
      });

      requestAnimationFrame(animationLoop);
    })();
  </script>
  <script>
    // Preload projects data and start loading Vimeo videos so they are ready when user visits Projects
    (function () {
      var VIMEO_EMBED_PARAMS = 'autoplay=1&loop=1&muted=1&autopause=0&background=1&title=0&byline=0&portrait=0&api=1';
      function vimeoEmbedUrl(baseUrl) {
        var sep = (baseUrl && baseUrl.indexOf('?') >= 0) ? '&' : '?';
        return baseUrl + sep + VIMEO_EMBED_PARAMS;
      }
      function startPreload() {
        var projects = window.__SANITY_PROJECTS;
        if (!Array.isArray(projects)) return;
        var container = document.createElement('div');
        container.setAttribute('aria-hidden', 'true');
        container.style.cssText = 'position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;';
        document.body.appendChild(container);
        projects.forEach(function (p) {
          if (p.isVimeoEmbed && p.media) {
            var iframe = document.createElement('iframe');
            iframe.src = vimeoEmbedUrl(p.media);
            iframe.setAttribute('tabindex', '-1');
            iframe.setAttribute('aria-hidden', 'true');
            iframe.allow = 'autoplay; fullscreen; picture-in-picture';
            iframe.loading = 'eager';
            container.appendChild(iframe);
          }
        });
      }
      if (window.__SANITY_PROJECTS) {
        startPreload();
      } else {
        var script = document.createElement('script');
        script.src = 'projects.embed.js';
        script.async = true;
        script.onload = startPreload;
        document.head.appendChild(script);
      }
    })();
  </script>
</body>
</html>
