<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Wilson</title>
  <style>
    /* Base */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #fff;
      color: #000;
      font: 18px Arial, sans-serif;
    }

    /* 12-column grid: 10px margins, 10px gutters */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      margin: 0 10px;
      max-width: 100%;
    }

    /* Fixed nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #fff;
      padding: 10px 10px 10px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav .name {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }
    .nav .name:hover {
      font-style: italic;
    }
    .nav-links {
      display: flex;
      flex: 0 0 50vw;
      width: 50vw;
      justify-content: space-between;
      align-items: center;
    }
    .nav-links a {
      font: 18px Arial, sans-serif;
      color: #000;
      text-decoration: none;
    }
    .nav-links a:hover {
      font-style: italic;
    }

    /* Page transition: content gently fades and slides, nav stays fixed */
    main {
      padding-top: 3em;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(24px);
      transition:
        transform 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
        opacity 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
    }
    main.page-entered {
      opacity: 1;
      transform: translateY(0);
    }
    main.page-exiting {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* Cursor trail canvas — below nav so nav stays clickable */
    #cursor-trail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="cursor-trail" width="10" height="10" aria-hidden="true"></canvas>
  <header class="nav">
    <a href="/" class="name">Mark Wilson</a>
    <nav class="nav-links">
      <a href="projects.html">Projects</a>
      <a href="info.html">Info</a>
      <a href="tools.html">Tools</a>
    </nav>
  </header>

  <main id="page-main">
    <div class="grid">
      <!-- Content will go here; grid is 12 columns, 10px margins, 10px gutters -->
    </div>
  </main>

  <script>
    (function () {
      var main = document.getElementById('page-main');
      if (!main) return;

      // Entry animation
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          main.classList.add('page-entered');
          window.scrollTo(0, 0);
        });
      });

      // Gentle fade/slide out on internal nav clicks
      function handleNavClick(event) {
        var link = event.currentTarget;
        var href = link.getAttribute('href');
        if (!href || href.indexOf('#') === 0 || link.target === '_blank') {
          return;
        }

        event.preventDefault();
        if (main.classList.contains('page-exiting')) return;

        main.classList.remove('page-entered');
        main.classList.add('page-exiting');

        setTimeout(function () {
          window.location.href = href;
        }, 500);
      }

      var navLinks = document.querySelectorAll('.nav a');
      navLinks.forEach(function (link) {
        link.addEventListener('click', handleNavClick);
      });
    })();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('cursor-trail');
      var ctx = canvas.getContext('2d');
      var trail = [];
      var maxTrail = 800;
      var lastX = -1, lastY = -1;
      var minDist = 2;
      var shrinking = false;
      var shrinkStartTime = 0;
      var shrinkDuration = 500;

      function resize() {
        var dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }

      var cssW = function () { return window.innerWidth; };
      var cssH = function () { return window.innerHeight; };

      function drawPath(points) {
        if (points.length < 2) return;
        ctx.clearRect(0, 0, cssW(), cssH());
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (var i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
      }

      function tick() {
        if (!shrinking) return;
        var elapsed = Date.now() - shrinkStartTime;
        var progress = Math.min(elapsed / shrinkDuration, 1);
        var total = trail.length;
        var visibleCount = Math.max(0, Math.ceil((1 - progress) * total));
        ctx.clearRect(0, 0, cssW(), cssH());
        if (visibleCount >= 2) {
          drawPath(trail.slice(0, visibleCount));
        }
        if (progress >= 1) {
          trail.length = 0;
          shrinking = false;
          return;
        }
        requestAnimationFrame(tick);
      }

      function startShrink() {
        if (trail.length < 2 || shrinking) return;
        shrinking = true;
        shrinkStartTime = Date.now();
        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', resize);
      resize();

      document.addEventListener('mousemove', function (e) {
        if (shrinking) return;
        var x = e.clientX, y = e.clientY;
        var dist = lastX < 0 ? minDist + 1 : Math.hypot(x - lastX, y - lastY);
        if (dist >= minDist) {
          trail.push({ x: x, y: y });
          if (trail.length > maxTrail) trail.shift();
          lastX = x;
          lastY = y;
          drawPath(trail);
        }
      });

      document.addEventListener('click', function () {
        startShrink();
      });

      document.addEventListener('mousedown', function (e) {
        if (e.button === 0) lastX = -1;
      });
    })();
  </script>
</body>
</html>
