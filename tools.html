<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Wilson</title>
    <link rel="icon" type="image/gif" href="assets/img/favicon-1.gif">

<style>
body {
    background-color: #000000;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

/* Home nav - from home.html */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: #000;
    padding: 10px 10px 10px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.nav .name {
    font: 18px Arial, sans-serif;
    color: #fff;
    text-decoration: none;
}
@media (hover: hover) {
    .nav .name:hover { font-style: italic; }
    .nav-links a:hover { font-style: italic; }
}
.nav-links {
    display: flex;
    flex: 0 0 50vw;
    width: 50vw;
    justify-content: space-between;
    align-items: center;
}
.nav-links a {
    font: 18px Arial, sans-serif;
    color: #fff;
    text-decoration: none;
}

/* Page transition: content gently fades and slides */
main#page-main {
    position: fixed;
    inset: 0;
    opacity: 0;
    transform: translateY(24px);
    transition:
        transform 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87),
        opacity 600ms cubic-bezier(0.74, 0.22, 0.31, 0.87);
}
main#page-main.page-entered {
    opacity: 1;
    transform: translateY(0);
}
main#page-main.page-exiting {
    opacity: 0;
    transform: translateY(-8px);
}

.container {
    position: fixed;
    left: 0;
    top: 20vh; /* Align with content start like Projects/Info */
    height: calc(100vh - 20vh);
    padding: 8px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    z-index: 99;
    background-color: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease-in-out;
}

.container.hidden {
    transform: translateX(-100%);
}

.nav-close-button {
    align-self: flex-end;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid #6a6a6a;
    color: #dbdbdb;
    padding: 8px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 18px;
    border-radius: 0;
    transition: all 0.2s ease;
    margin-bottom: 8px;
    min-height: 44px; /* Touch-friendly */
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
}

@media (hover: hover) {
    .nav-close-button:hover {
        color: #ffffff;
        border-color: #ffffff;
        background: rgba(255, 255, 255, 0.15);
    }
    .nav-toggle:hover {
        color: #ffffff;
        border-color: #ffffff;
    }
    .container a:hover {
        font-style: italic;
        color: #dbdbdb;
    }
}

@media (min-width: 769px) {
    .nav-close-button {
        display: none; /* Hide on desktop */
    }
}

.nav-toggle {
    position: fixed;
    top: 58px; /* Below home nav */
    left: 8px;
    z-index: 101;
    background: rgba(0, 0, 0, 0.8);
    border: 2px solid #6a6a6a;
    color: #dbdbdb;
    padding: 8px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 18px;
    border-radius: 0;
    transition: all 0.2s ease;
    width: 40px;
    height: 40px;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
}

.nav-toggle.visible {
    display: flex;
}

/* Desktop: hide toggle button, nav always visible */
@media (min-width: 769px) {
    .nav-toggle {
        display: none !important;
    }
    
    .container {
        transform: none !important; /* Always visible on desktop */
    }
    
    .container.hidden {
        transform: none !important; /* Override hidden state on desktop */
    }
}

/* Back link spacing */
.container .back {
    padding-top: 10px;
}

/* Stagger animation for project list items */
.container > div {
    opacity: 0;
    transform: translateY(12px);
    animation: tools-item-in 400ms cubic-bezier(0.74, 0.22, 0.31, 0.87) forwards;
}
.container > div:nth-child(2) { animation-delay: 50ms; }
.container > div:nth-child(3) { animation-delay: 90ms; }
.container > div:nth-child(4) { animation-delay: 130ms; }
.container > div:nth-child(5) { animation-delay: 170ms; }
.container > div:nth-child(6) { animation-delay: 210ms; }
.container > div:nth-child(7) { animation-delay: 250ms; }
.container > div:nth-child(8) { animation-delay: 290ms; }
.container > div:nth-child(9) { animation-delay: 330ms; }
.container > div:nth-child(10) { animation-delay: 370ms; }
.container > div:nth-child(11) { animation-delay: 410ms; }
.container > div:nth-child(12) { animation-delay: 450ms; }
@keyframes tools-item-in {
    to { opacity: 1; transform: translateY(0); }
}

/* text styles */
.container a {
    font-size: 18px;
    text-align: left;
    font-family: Arial, sans-serif;
    color: #dbdbdb;
    margin: 0;
    letter-spacing: 0.0rem;
    text-decoration: none;
}
.container a.active {
    font-style: italic;
    color: #dbdbdb;
}

p,
a {
    text-align: left;
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #dbdbdb;
    margin: 0;
    letter-spacing: 0.0rem;
    text-decoration: none;
}
@media (hover: hover) {
    a:hover { color: #dbdbdb; }
}
a.active {
    color: #dbdbdb;
}
::selection {
    color: #dbdbdb;
}

/* Project iframe container */
.project-iframe-container {
    position: fixed;
    top: 20vh; /* Align with content start like Projects/Info */
    left: 0;
    width: 100%;
    height: calc(100vh - 20vh);
    z-index: 1;
    background-color: #000000;
    transition: left 0.3s ease-in-out, width 0.3s ease-in-out;
}

.project-iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Mobile styles */
@media (max-width: 768px) {
    .nav { padding: 12px 10px; }
    .nav-links {
        flex: 0 0 auto;
        width: auto;
        gap: 20px;
    }
    .nav .name,
    .nav-links a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
    }
    .container {
        z-index: 200;
        width: 130px;
        padding: 8px 6px;
        top: 20vh;
        height: calc(100vh - 20vh);
    }
    
    .nav-toggle {
        display: flex;
        border: none;
        top: 58px;
    }
    
    .nav-close-button {
        border: none;
    }
    
    .project-iframe-container {
        left: 0 !important;
        width: 100% !important;
        top: 20vh;
        height: calc(100vh - 20vh);
    }
    
    .container.hidden ~ .project-iframe-container {
        left: 0 !important;
        width: 100% !important;
    }
    
    /* Make nav links more touch-friendly on mobile */
    .container a {
        padding: 8px 0;
        font-size: 18px;
        white-space: nowrap;
    }
    
    /* Add extra spacing between nav items on mobile */
    .container > div {
        margin-bottom: 5px;
        padding-top: 5px;
        padding-bottom: 5px;
    }
}

</style>

</head>

<body>
    <header class="nav">
        <a href="/" class="name">Mark Wilson</a>
        <nav class="nav-links">
            <a href="projects.html">Projects</a>
            <a href="info.html">Info</a>
            <a href="tools.html">Tools</a>
        </nav>
    </header>

    <main id="page-main">
    <button class="nav-toggle" id="navToggle">☰</button>
    <div class="container" id="navContainer">
        <button class="nav-close-button" id="navCloseButton">✕</button>

        <div>
            <a href="./tools/type-face/" data-project="type-face">Type Face</a>
        </div>

        <div>
            <a href="./tools/pretty-fly/" data-project="pretty-fly">Pretty Fly</a>
        </div>  

        <div>
            <a href="./tools/outer-stellar/" data-project="outer-stellar">Outer Stellar</a>
        </div>

        <div>
            <a href="./tools/from-from/" data-project="from-from"><span style="font-style: italic;">From</span> From</a>
        </div>

        <div>
            <a href="./tools/pattern pattern/" data-project="pattern-pattern">Pattern Pattern</a>
        </div>


        <div>
            <a href="./tools/move-ment/" data-project="move-ment">Move Ment</a>
        </div>

        <div>
            <a href="./tools/snow-globe/" data-project="snow-globe">Snow Globe</a>
        </div>

        <div>
            <a href="./tools/thy-typer/" data-project="thy-typer">Thy Typer</a>
        </div>

        <div>
            <a href="./tools/interactive-typer/" data-project="interactive-typer">Interactive Typer</a>
        </div>

        <div class="back">
            <a href="https://markwilson.xyz">🡠 Back</a>
        </div>
    </div>

    <!-- Project iframe container -->
    <div class="project-iframe-container">
        <iframe id="project-iframe" src=""></iframe>
    </div>

    </main>

    <script>
        (function () {
            var main = document.getElementById('page-main');
            if (!main) return;

            // Entry animation
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    main.classList.add('page-entered');
                    window.scrollTo(0, 0);
                });
            });

            // Gentle fade/slide out on internal nav clicks
            function handleNavClick(event) {
                var link = event.currentTarget;
                var href = link.getAttribute('href');
                if (!href || href.indexOf('#') === 0 || link.target === '_blank') {
                    return;
                }

                event.preventDefault();
                if (main.classList.contains('page-exiting')) return;

                main.classList.remove('page-entered');
                main.classList.add('page-exiting');

                setTimeout(function () {
                    if (href && href.indexOf('info') !== -1) {
                        try { sessionStorage.setItem('infoFrom', 'tools'); } catch (e) {}
                    }
                    window.location.href = href;
                }, 500);
            }

            var navLinks = document.querySelectorAll('.nav a');
            navLinks.forEach(function (link) {
                link.addEventListener('click', handleNavClick);
            });
        })();
    </script>
    <script>
        const projectIframe = document.getElementById('project-iframe');
        const navContainer = document.querySelector('.container');
        const iframeContainer = document.querySelector('.project-iframe-container');
        const navToggle = document.getElementById('navToggle');
        
        // Toggle navigation visibility (mobile only)
        let navVisible = window.innerWidth > 768; // Hidden on mobile by default
        function toggleNav() {
            // Only allow toggling on mobile
            if (window.innerWidth <= 768) {
                navVisible = !navVisible;
                navContainer.classList.toggle('hidden', !navVisible);
                updateIframePosition();
            }
        }
        
        // Set initial state
        if (window.innerWidth <= 768) {
            navContainer.classList.add('hidden');
            navVisible = false;
        } else {
            navContainer.classList.remove('hidden');
            navVisible = true;
        }
        
        const navCloseButton = document.getElementById('navCloseButton');
        
        navToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleNav();
        });
        
        navCloseButton.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleNav(); // Only works on mobile anyway
        });
        
        // Close nav when clicking outside on mobile
        if (window.innerWidth <= 768) {
            document.addEventListener('click', (e) => {
                if (navVisible && !navContainer.contains(e.target) && !navToggle.contains(e.target)) {
                    toggleNav();
                }
            });
        }
        
        // Close nav when a nav link is clicked on mobile
        const navLinks = document.querySelectorAll('.container a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    // Small delay to allow project to load, then close nav
                    setTimeout(() => {
                        if (navVisible) {
                            toggleNav();
                        }
                    }, 100);
                }
            });
        });

        // Function to update iframe position based on nav width
        function updateIframePosition() {
            const navBarHeight = 50;
            if (window.innerWidth <= 768) {
                // Mobile: iframe is always full width, nav overlays
                iframeContainer.style.left = '0';
                iframeContainer.style.width = '100%';
                iframeContainer.style.top = navBarHeight + 'px';
                iframeContainer.style.height = `calc(100vh - ${navBarHeight}px)`;
                navToggle.classList.add('visible');
            } else {
                // Desktop: nav always visible, iframe adjusts to nav width
                const navWidth = navContainer.offsetWidth;
                const iframeLeft = navWidth + 8; // 8px gap
                iframeContainer.style.left = iframeLeft + 'px';
                iframeContainer.style.width = `calc(100% - ${iframeLeft}px)`;
                iframeContainer.style.top = navBarHeight + 'px';
                iframeContainer.style.height = `calc(100vh - ${navBarHeight}px)`;
            }
        }

        // Update on load and resize
        updateIframePosition();
        window.addEventListener('resize', () => {
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                navToggle.classList.add('visible');
                if (!navVisible) {
                    navContainer.classList.add('hidden');
                }
            } else {
                // Desktop: nav always visible, no toggle button
                navToggle.classList.remove('visible');
                navContainer.classList.remove('hidden');
                navVisible = true;
            }
            updateIframePosition();
        });
        
        // Also update after a short delay to ensure nav is fully rendered
        setTimeout(updateIframePosition, 100);

        // Map project names to their URLs
        const projectMap = {
            'type-face': './tools/type-face/',
            'pretty-fly': './tools/pretty-fly/',
            'outer-stellar': './tools/outer-stellar/',
            'face-mask': './tools/face-mask/index.html',
            'from-from': './tools/from-from/',
            'pattern-pattern': './tools/pattern pattern/',
            'pattern-tool': './tools/pattern-tool/',
            'thy-typer': './tools/thy-typer/',
            'interactive-typer': './tools/interactive-typer/',
            'move-ment': './tools/move-ment/',
            'snow-globe': './tools/snow-globe/'
        };

        // Projects that use camera
        const cameraProjects = ['type-face', 'face-mask', 'from-from'];

        let activeProject = null;
        let cameraStream = null;
        let cameraReady = false;

        // Request camera stream once and keep it active
        async function initializeCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                cameraReady = true;
                console.log('Camera stream initialized and ready to share');
            } catch (error) {
                console.log('Camera initialization error:', error.message);
                cameraReady = false;
            }
        }

        // Initialize camera when page loads
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            initializeCamera();
        }

        // Listen for messages from iframes
        window.addEventListener('message', (event) => {
            // Verify origin for security
            if (event.origin !== window.location.origin) return;
            
            if (event.data === 'requestCameraStream') {
                // Iframe is requesting camera stream
                if (cameraStream && cameraReady) {
                    // Clone the stream tracks so iframe can use it
                    const clonedTracks = cameraStream.getVideoTracks().map(track => {
                        const settings = track.getSettings();
                        return {
                            id: track.id,
                            label: track.label,
                            kind: track.kind,
                            enabled: track.enabled,
                            muted: track.muted,
                            readyState: track.readyState,
                            settings: settings
                        };
                    });
                    
                    // Send stream info to iframe
                    projectIframe.contentWindow.postMessage({
                        type: 'cameraStreamReady',
                        tracks: clonedTracks
                    }, window.location.origin);
                } else {
                    // Camera not ready yet, wait and retry
                    setTimeout(() => {
                        if (cameraStream && cameraReady) {
                            projectIframe.contentWindow.postMessage({
                                type: 'cameraStreamReady'
                            }, window.location.origin);
                        } else {
                            projectIframe.contentWindow.postMessage({
                                type: 'cameraStreamError',
                                message: 'Camera not available'
                            }, window.location.origin);
                        }
                    }, 500);
                }
            }
        });

        // Function to load a project
        function loadProject(projectName) {
            if (!projectName || !projectMap[projectName]) {
                console.error('Invalid project name:', projectName);
                return;
            }
            
            const link = document.querySelector(`a[data-project="${projectName}"]`);
            if (!link) {
                console.error('Link not found for project:', projectName);
                return;
            }
            
            // Remove active class from all links
            document.querySelectorAll('a[data-project]').forEach(a => {
                a.classList.remove('active');
            });
            
            // Add active class to selected link
            link.classList.add('active');
            
            // Load project in iframe
            projectIframe.src = projectMap[projectName];
            activeProject = projectName;
            
            // Update iframe position after loading
            setTimeout(updateIframePosition, 50);
            
            // If it's a camera project, notify iframe when it loads
            if (cameraProjects.includes(projectName)) {
                projectIframe.addEventListener('load', () => {
                    if (cameraStream && cameraReady) {
                        projectIframe.contentWindow.postMessage({
                            type: 'cameraStreamReady'
                        }, window.location.origin);
                    }
                }, { once: true });
            }
        }

        // Handle project link clicks
        Object.keys(projectMap).forEach(projectName => {
            const link = document.querySelector(`a[data-project="${projectName}"]`);
            if (link) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Remove URL parameter when clicking on a project
                    const url = new URL(window.location);
                    url.searchParams.delete('project');
                    window.history.replaceState({}, '', url.pathname);
                    loadProject(projectName);
                });
            }
        });

        // Check for URL parameter to determine which project to load
        const urlParams = new URLSearchParams(window.location.search);
        const projectParam = urlParams.get('project');
        const projectToLoad = projectParam && projectMap[projectParam] ? projectParam : 'type-face';
        
        // Load the project (defaults to type-face if no parameter)
        loadProject(projectToLoad);
    </script>

</body>
