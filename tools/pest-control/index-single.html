    let blazeImg = null;
    let ratImg = null;
    let agents = [];
    let paused = false;
    let mouseOverCanvas = false;
    let ratPos = null;

    function ratDisplayDimensions() {
      if (ratImg && ratImg.width > 0) {
        const h = RAT_DISPLAY_HEIGHT;
        const w = (ratImg.width * h) / ratImg.height;
        return { w, h };
      }
      return { w: RAT_DISPLAY_HEIGHT, h: RAT_DISPLAY_HEIGHT };
    }

    /** Blaze SVG/triangle size (same as draw()); pos is image center. */
    function blazeSpriteDimensions() {
      const ht = SPRITE_HEIGHT;
      const wd =
        blazeImg && blazeImg.width > 0
          ? blazeImg.width * (ht / blazeImg.height)
          : ht * (100 / 129);
      return { wd, ht };
    }

    /** Eat when rat and blaze overlap; slightly under full diagonal sum so it matches visible contact. */
    function ratEatRadius() {
      const { wd, ht } = blazeSpriteDimensions();
      const blazeReach = Math.hypot(wd * 0.5, ht * 0.5);
      const { w, h } = ratDisplayDimensions();
      const ratReach = Math.hypot(w * 0.5, h * 0.5);
      return (blazeReach + ratReach) * 0.82;
    }

    function preload() {
      blazeImg = loadImage(
        BLAZE_SVG,
        function () {},
        function () {
          blazeImg = null;
        }
      );
      ratImg = loadImage(
        RAT_DATA_URL,
        function () {},
        function () {
          ratImg = null;
        }
      );
    }

    function polylineLengthPx(pts, wrapBreak) {
      let s = 0;
      for (let i = 1; i < pts.length; i++) {
        const d = p5.Vector.dist(pts[i - 1], pts[i]);
        if (d <= wrapBreak) s += d;
      }
      return s;
    }

    function placeRatAwayFrom(head) {
      const { w, h } = ratDisplayDimensions();
      const { wd, ht } = blazeSpriteDimensions();
      const m = Math.max(w, h, wd, ht) * 0.55;
      const clearR = ratEatRadius() + 30;
      let x;
      let y;
      let guard = 0;
      do {
        x = random(m, width - m);
        y = random(m, height - m);
        guard++;
      } while (
        head &&
        p5.Vector.dist(head, createVector(x, y)) < clearR &&
        guard < 80
      );
      ratPos = createVector(x, y);
    }

    class Blaze {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.vel = p5.Vector.random2D().mult(random(0.5, MAX_SPEED));
        this.history = [];
        this.wanderNX = random(80, 920);
        this.wanderNY = random(80, 920);
        this.maxTrailLengthPx = INITIAL_TRAIL_PX;
        this.seedInitialTrail();
      }

      /** Backfill history so the snake visibly starts near INITIAL_TRAIL_PX long. */
      seedInitialTrail() {
        const step = Math.max(MAX_SPEED, 1.2);
        let remaining = INITIAL_TRAIL_PX;
        let p = this.pos.copy();
        let back = this.vel.copy();
        if (back.magSq() < 1e-8) {
          back = p5.Vector.random2D();
        }
        back.normalize().mult(-step);
        while (remaining > 0) {
          p.add(back);
          this.history.unshift(p.copy());
          remaining -= step;
        }
      }

      updateCursor(target, repel) {
        let toward = p5.Vector.sub(target, this.pos);
        if (repel) {
          toward.mult(-1);
        }
        if (toward.magSq() < 1e-6) {
          toward = this.vel.copy();
          if (toward.magSq() < 1e-6) {
            toward = p5.Vector.random2D();
          }
        }
        toward.normalize();
        toward.mult(MAX_SPEED);
        let steer = p5.Vector.sub(toward, this.vel);
        steer.limit(MAX_FORCE);
        this.vel.add(steer);
        this.vel.limit(MAX_SPEED);
        this.integrate();
      }

      updateMurmurWander() {
        const t = frameCount * 0.0038;
        const angle =
          noise(this.wanderNX + t, this.wanderNY + t * 0.71) * TWO_PI * 2;
        const desired = p5.Vector.fromAngle(angle).mult(MAX_SPEED);
        const steer = p5.Vector.sub(desired, this.vel).limit(MAX_FORCE);
        this.vel.add(steer);
        this.vel.limit(MAX_SPEED);
        this.integrate();
      }

      trimTrail() {
        const wrapBreak = Math.min(width, height) * 0.48;
        while (
          this.history.length > 1 &&
          polylineLengthPx(this.history, wrapBreak) > this.maxTrailLengthPx
        ) {
          this.history.shift();
        }
      }

      integrate() {
        this.pos.add(this.vel);

        if (this.pos.x < 0) this.pos.x += width;
        else if (this.pos.x > width) this.pos.x -= width;
        if (this.pos.y < 0) this.pos.y += height;
        else if (this.pos.y > height) this.pos.y -= height;

        this.history.push(this.pos.copy());
        this.trimTrail();
      }

      tryEatRat() {
        if (!ratPos || !ratImg || ratImg.width <= 0) return;
        if (p5.Vector.dist(this.pos, ratPos) < ratEatRadius()) {
          this.maxTrailLengthPx += TRAIL_GROW_PX;
          placeRatAwayFrom(this.pos);
        }
      }

      drawTrail() {
        if (this.history.length < 2) return;
        const ctx = drawingContext;
        const w = width;
        const h = height;
        const wrapBreak = Math.min(w, h) * 0.48;

        ctx.save();
        ctx.strokeStyle = TRAIL_COLOR;
        ctx.lineWidth = TRAIL_LINE_WIDTH;
        ctx.setLineDash(TRAIL_DASH);
        ctx.beginPath();
        ctx.moveTo(this.history[0].x, this.history[0].y);
        for (let i = 1; i < this.history.length; i++) {
          const a = this.history[i - 1];
          const b = this.history[i];
          if (p5.Vector.dist(a, b) > wrapBreak) {
            ctx.moveTo(b.x, b.y);
          } else {
            ctx.lineTo(b.x, b.y);
          }
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      drawSprite(wd, ht) {
        if (blazeImg && blazeImg.width > 0) {
          image(blazeImg, 0, 0, wd, ht);
          return;
        }
        fill(BLAZE_FILL);
        noStroke();
        triangle(0, -ht * 0.5, -wd * 0.5, ht * 0.5, wd * 0.5, ht * 0.5);
      }

      draw() {
        const ht = SPRITE_HEIGHT;
        const wd = blazeImg && blazeImg.width > 0
          ? blazeImg.width * (ht / blazeImg.height)
          : ht * (100 / 129);
        push();
        translate(this.pos.x, this.pos.y);
        rotate(this.vel.heading() + HALF_PI);
        this.drawSprite(wd, ht);
        pop();
      }
    }

    function drawGradientBackground() {
      const ctx = drawingContext;
      ctx.save();
      ctx.fillStyle = BG_BASE;
      ctx.fillRect(0, 0, width, height);
      const g = ctx.createLinearGradient(0, 0, 0, height);
      g.addColorStop(0, GRADIENT_TOP);
      g.addColorStop(1, GRADIENT_BOTTOM);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();
    }

    function drawRat() {
      if (!ratPos || !ratImg || ratImg.width <= 0) return;
      const { w, h } = ratDisplayDimensions();
      push();
      image(ratImg, ratPos.x, ratPos.y, w, h);
      pop();
    }

    function canvasHeightPx() {
      const viewH = Math.max(window.innerHeight, document.documentElement.clientHeight);
      return Math.max(viewH, SPRITE_HEIGHT + 80);
    }

    function initAgents() {
      agents = [];
      for (let i = 0; i < POPULATION; i++) {
        agents.push(new Blaze());
      }
      ratPos = null;
      if (agents.length) {
        placeRatAwayFrom(agents[0].pos);
      }
    }

    function bindCanvasInput(cnv) {
      const el = cnv.elt;
      el.addEventListener('click', function () {
        paused = !paused;
      });
      el.addEventListener('mouseenter', function () {
        mouseOverCanvas = true;
      });
      el.addEventListener('mouseleave', function () {
        mouseOverCanvas = false;
      });
    }

    function setup() {
      const cnv = createCanvas(windowWidth, canvasHeightPx());
      cnv.parent('sketch-host');
      bindCanvasInput(cnv);

      initAgents();

      imageMode(CENTER);
    }

    function windowResized() {
      resizeCanvas(windowWidth, canvasHeightPx());
      if (ratPos) {
        const { w, h } = ratDisplayDimensions();
        const m = Math.max(w, h) * 0.55;
        ratPos.x = constrain(ratPos.x, m, width - m);
        ratPos.y = constrain(ratPos.y, m, height - m);
      }
    }

    function draw() {
      drawGradientBackground();

      const target = createVector(mouseX, mouseY);

      if (!paused) {
        for (let i = 0; i < agents.length; i++) {
          if (mouseOverCanvas) {
            agents[i].updateCursor(target, false);
          } else {
            agents[i].updateMurmurWander();
          }
          agents[i].tryEatRat();
        }
      }

      for (let i = 0; i < agents.length; i++) {
        agents[i].drawTrail();
      }

      drawRat();

      for (let i = 0; i < agents.length; i++) {
        agents[i].draw();
      }
    }
  </script>
