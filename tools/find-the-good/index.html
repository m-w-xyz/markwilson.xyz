    // Column offsets for staggered poem syntax (in grid cells)
    const POEM_OFFSETS = [3, -2, 5, -1, 2, -4];
    const SENTENCE_CHARS = (POEM_LINES.join(' ') + ' ').toUpperCase();
    const SENTENCE_LEN = SENTENCE_CHARS.length;

    function poemBlockStartRow(h) {
      return Math.max(0, Math.floor((h / CFG.cellH - POEM_LINES.length) / 2));
    }

    function getRowLayout(row, w, h) {
      const blockStart = poemBlockStartRow(h);
      const lineIdx = row - blockStart;
      const cols = Math.ceil(w / CFG.cellW) + 1;
      const centerCol = Math.floor(cols / 2);

      if (lineIdx >= 0 && lineIdx < POEM_LINES.length) {
        const line = POEM_LINES[lineIdx];
        const offset = POEM_OFFSETS[lineIdx] ?? 0;
        let startCol = centerCol - Math.floor(line.length / 2) + offset;
        startCol = Math.max(0, Math.min(startCol, cols - line.length));

        const anchor = SENTENCE_CHARS.indexOf(line);
        const rowStart = anchor >= 0
          ? ((anchor - startCol) % SENTENCE_LEN + SENTENCE_LEN) % SENTENCE_LEN
          : (Math.random() * SENTENCE_LEN) | 0;
        return { rowStart, pinStart: startCol, pinEnd: startCol + line.length };
      }

      return {
        rowStart: (Math.random() * SENTENCE_LEN) | 0,
        pinStart: -1,
        pinEnd: -1
      };
    }

    function charAt(rowStart, col) {
      return SENTENCE_CHARS.charCodeAt((rowStart + col) % SENTENCE_LEN);

    const WEIGHT_BUCKETS = Int16Array.from([100, 250, 450, 650, 850]);

    function hashNoise(x, y) {
      let n = (x * 374761393 + y * 668265263) | 0;
      n = (n ^ (n >>> 13)) * 1274126177;
      n = n ^ (n >>> 16);
      return n * 2.328306e-10 - 1;
    }

    function valueNoise(x, y) {
      const x0 = Math.floor(x);
      const y0 = Math.floor(y);
      const tx = x - x0;
      const ty = y - y0;
      const sx = tx * tx * (3 - 2 * tx);
      const sy = ty * ty * (3 - 2 * ty);
      const n00 = hashNoise(x0, y0);
      const n10 = hashNoise(x0 + 1, y0);
      const n01 = hashNoise(x0, y0 + 1);
      const n11 = hashNoise(x0 + 1, y0 + 1);
      const nx0 = n00 + (n10 - n00) * sx;
      const nx1 = n01 + (n11 - n01) * sx;
      return nx0 + (nx1 - nx0) * sy;
    }

    function fbm(x, y) {
      let amp = 1;
      let freq = 1;
      let sum = 0;
      let norm = 0;
      for (let o = 0; o < CFG.curlOctaves; o++) {
        sum += valueNoise(x * freq, y * freq) * amp;
        norm += amp;
        amp *= CFG.curlPersistence;
        freq *= CFG.curlLacunarity;
      }
      return sum / norm;
    }

    function curlNoise(sx, sy, st) {
      const eps = 1.1;
      const nyp = fbm(sx, sy + eps + st * 0.31);
      const nym = fbm(sx, sy - eps + st * 0.31);
      const nxp = fbm(sx + eps + st * 0.23, sy);
      const nxm = fbm(sx - eps + st * 0.23, sy);
      return {
        fx: (nyp - nym) / (2 * eps),
        fy: -(nxp - nxm) / (2 * eps)
      };
    }

    function curlForceAt(wx, wy, phase) {
      const sx = wx * CFG.curlScale;
      const sy = wy * CFG.curlScale;
      const st = noiseTime + phase;
      return curlNoise(sx, sy, st);
    }

    function windForceAt(wx, wy) {
      const sx = wx * CFG.windScale;
      const sy = wy * CFG.windScale;
      return curlNoise(sx, sy, noiseTime);
    }

    async function loadFont() {
      await document.fonts.load("11px 'Penray'");
      await document.fonts.ready;
    }

    function resizeStage() {
      stageW = window.innerWidth;
      stageH = window.innerHeight;

      dpr = Math.min(window.devicePixelRatio, 2);
      canvas.width = Math.round(stageW * dpr);
      canvas.height = Math.round(stageH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      viewportMap = updateViewportMap();
      buildGrid();
      masksDirty = true;
    }

    function buildGrid() {
      if (!stageW || !stageH) return;

      gridCols = Math.ceil(stageW / CFG.cellW) + 1;
      gridRows = Math.ceil(stageH / CFG.cellH) + 1;
      faceMask = new Uint8Array(gridCols * gridRows);
      imprintStrength = new Float32Array(gridCols * gridRows);
      handImprintGrid = new Float32Array(gridCols * gridRows);

      const pinTmpX = [];
      const pinTmpY = [];
      const pinTmpC = [];
      const pxTmp = [];
      const pyTmp = [];
      const cTmp = [];
      const cellTmp = [];

      for (let row = 0; row < gridRows; row++) {
        const { rowStart, pinStart, pinEnd } = getRowLayout(row, stageW, stageH);

        for (let col = 0; col < gridCols; col++) {
          const cx = col * CFG.cellW + CFG.cellW * 0.5;
          const cy = row * CFG.cellH + CFG.cellH * 0.5;
          const code = charAt(rowStart, col);
          const isPinned = col >= pinStart && col < pinEnd;

          if (isPinned) {
            pinTmpX.push(cx);
            pinTmpY.push(cy);
            pinTmpC.push(code);
          } else {
            pxTmp.push(cx);
            pyTmp.push(cy);
            cTmp.push(code);
            cellTmp.push(row * gridCols + col);
          }
        }
      }

      count = pxTmp.length;
      pinnedCount = pinTmpX.length;

      px = Float32Array.from(pxTmp);
      py = Float32Array.from(pyTmp);
      x = Float32Array.from(pxTmp);
      y = Float32Array.from(pyTmp);
      vx = new Float32Array(count);
      vy = new Float32Array(count);
      smAx = new Float32Array(count);
      smAy = new Float32Array(count);
      weight = new Float32Array(count);
      weight.fill(CFG.minWeight);
      impHome = new Float32Array(count);
      faceImpHome = new Float32Array(count);
      handImpHome = new Float32Array(count);
      drawAlpha = new Float32Array(count);
      cellIdx = Uint32Array.from(cellTmp);
      chars = Uint16Array.from(cTmp);

      neighborIdx = new Int32Array(count * 4).fill(-1);
      prevDispX = new Float32Array(count);
      prevDispY = new Float32Array(count);
      const cellToParticle = new Int32Array(gridCols * gridRows).fill(-1);
      for (let i = 0; i < count; i++) cellToParticle[cellIdx[i]] = i;
      for (let i = 0; i < count; i++) {
        const cell = cellIdx[i];
        const row = (cell / gridCols) | 0;
        const col = cell - row * gridCols;
        const nb = i * 4;
        if (row > 0) neighborIdx[nb] = cellToParticle[cell - gridCols];
        if (row < gridRows - 1) neighborIdx[nb + 1] = cellToParticle[cell + gridCols];
        if (col > 0) neighborIdx[nb + 2] = cellToParticle[cell - 1];
        if (col < gridCols - 1) neighborIdx[nb + 3] = cellToParticle[cell + 1];
      }

      pinX = Float32Array.from(pinTmpX);
      pinY = Float32Array.from(pinTmpY);
      pinChars = Uint16Array.from(pinTmpC);
    }

    function updateViewportMap() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh || !stageW || !stageH) return null;

      const coverScale = Math.max(stageW / vw, stageH / vh);
      const displayW = vw * coverScale;
      const displayH = vh * coverScale;

      return {
        vw, vh,
        sx: stageW,
        sy: stageH,
        coverScale,
        offsetX: (displayW - stageW) * 0.5,
        offsetY: (displayH - stageH) * 0.5
      };
    }

    function mapLandmarkToStage(nx, ny) {
      const { vw, vh, sx, coverScale, offsetX, offsetY } = viewportMap;
      const vx = nx * vw;
      const vy = ny * vh;
      return {
        x: sx - (vx * coverScale - offsetX),
        y: vy * coverScale - offsetY
      };
    }

    function pointOnStage(x, y, margin) {
      const m = margin ?? CFG.handStageMargin;
      return x >= -m && x <= stageW + m && y >= -m && y <= stageH + m;
    }

    function handLandmarksOnStage(lms) {
      let onStage = 0;
      for (let i = 0; i < lms.length; i++) {
        const mapped = mapLandmarkToStage(lms[i].x, lms[i].y);
        if (pointOnStage(mapped.x, mapped.y)) onStage++;
      }
      return onStage >= CFG.handMinOnStagePts;
    }

    function clearHand(h) {
      handPresence[h] = 0;
      handInit[h] = 0;
      handTracked[h] = 0;
      handActive[h] = 0;
      handSpeed[h] = 0;
      handLastMs[h] = 0;
      handVelBoost[h] = 1;
    }

    function decayHand(h, fast, dtMs) {
      const base = fast ? CFG.handFadeOutOffstage : CFG.handFadeOutPerFrame;
      const factor = Math.pow(base, dtMs / 16.67);
      handPresence[h] *= factor;
      if (handPresence[h] < CFG.handClearThreshold) clearHand(h);
    }

    function totalHandInfluence() {
      let sum = 0;
      for (let h = 0; h < MAX_HANDS; h++) sum += handPresence[h];
      return sum;
    }

    function updateHandInfluence(dtMs) {
      let dirty = false;
      for (let h = 0; h < MAX_HANDS; h++) {
        if (handPresence[h] <= 0) continue;
        if (!handTracked[h]) {
          const before = handPresence[h];
          decayHand(h, false, dtMs);
          if (handPresence[h] !== before) dirty = true;
        }
      }
      if (dirty) masksDirty = true;
    }

    function pointInPolygon(x, y, polyX, polyY, n) {
      let inside = false;
      for (let i = 0, j = n - 1; i < n; j = i++) {
        const yi = polyY[i];
        const yj = polyY[j];
        if (yi > y !== yj > y) {
          const xi = polyX[i];
          const xj = polyX[j];
          if (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) inside = !inside;
        }
      }
      return inside;
    }

    function distToSegment(px, py, x0, y0, x1, y1) {
      const dx = x1 - x0;
      const dy = y1 - y0;
      const len2 = dx * dx + dy * dy;
      if (len2 < 0.01) {
        const ex = px - x0;
        const ey = py - y0;
        return Math.sqrt(ex * ex + ey * ey);
      }
      let t = ((px - x0) * dx + (py - y0) * dy) / len2;
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      const ex = px - (x0 + t * dx);
      const ey = py - (y0 + t * dy);
      return Math.sqrt(ex * ex + ey * ey);
    }

    function stampDisc(cx, cy, radius, peak, grid) {
      const target = grid ?? imprintStrength;
      if (!target || radius <= 0 || peak <= 0) return;
      const c0 = Math.max(0, Math.floor((cx - radius) / CFG.cellW));
      const c1 = Math.min(gridCols, Math.ceil((cx + radius) / CFG.cellW) + 1);
      const r0 = Math.max(0, Math.floor((cy - radius) / CFG.cellH));
      const r1 = Math.min(gridRows, Math.ceil((cy + radius) / CFG.cellH) + 1);
      const invR = 1 / radius;

      for (let row = r0; row < r1; row++) {
        const py = row * CFG.cellH + CFG.cellH * 0.5;
        for (let col = c0; col < c1; col++) {
          const px = col * CFG.cellW + CFG.cellW * 0.5;
          const ex = px - cx;
          const ey = py - cy;
          const dist = Math.sqrt(ex * ex + ey * ey);
          if (dist >= radius) continue;
          const t = 1 - dist * invR;
          const v = peak * t * t;
          const idx = row * gridCols + col;
          if (v > target[idx]) target[idx] = v;
        }
      }
    }

    function stampSegment(x0, y0, x1, y1, radius, peak, grid) {
      const target = grid ?? imprintStrength;
      if (!target || radius <= 0 || peak <= 0) return;
      const minX = Math.min(x0, x1) - radius;
      const maxX = Math.max(x0, x1) + radius;
      const minY = Math.min(y0, y1) - radius;
      const maxY = Math.max(y0, y1) + radius;
      const c0 = Math.max(0, Math.floor(minX / CFG.cellW));
      const c1 = Math.min(gridCols, Math.ceil(maxX / CFG.cellW) + 1);
      const r0 = Math.max(0, Math.floor(minY / CFG.cellH));
      const r1 = Math.min(gridRows, Math.ceil(maxY / CFG.cellH) + 1);
      const invR = 1 / radius;

      for (let row = r0; row < r1; row++) {
        const py = row * CFG.cellH + CFG.cellH * 0.5;
        for (let col = c0; col < c1; col++) {
          const px = col * CFG.cellW + CFG.cellW * 0.5;
          const dist = distToSegment(px, py, x0, y0, x1, y1);
          if (dist >= radius) continue;
          const t = 1 - dist * invR;
          const v = peak * t * t;
          const idx = row * gridCols + col;
          if (v > target[idx]) target[idx] = v;
        }
      }
    }

    function stampDiscToGrid(grid, cx, cy, radius, peak) {
      stampDisc(cx, cy, radius, peak, grid);
    }

    function stampSegmentToGrid(grid, x0, y0, x1, y1, radius, peak) {
      stampSegment(x0, y0, x1, y1, radius, peak, grid);
    }

    function featureCentroid(indices, xs, ys) {
      let cx = 0;
      let cy = 0;
      for (let i = 0; i < indices.length; i++) {
        const p = indices[i];
        cx += xs[p];
        cy += ys[p];
      }
      const inv = 1 / indices.length;
      return { x: cx * inv, y: cy * inv };
    }

    function fillPolygonStrength(polyX, polyY, n, peak) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i < n; i++) {
        if (polyX[i] < minX) minX = polyX[i];
        if (polyY[i] < minY) minY = polyY[i];
        if (polyX[i] > maxX) maxX = polyX[i];
        if (polyY[i] > maxY) maxY = polyY[i];
      }

      const c0 = Math.max(0, Math.floor(minX / CFG.cellW) - 1);
      const c1 = Math.min(gridCols, Math.ceil(maxX / CFG.cellW) + 2);
      const r0 = Math.max(0, Math.floor(minY / CFG.cellH) - 1);
      const r1 = Math.min(gridRows, Math.ceil(maxY / CFG.cellH) + 2);

      for (let row = r0; row < r1; row++) {
        const cy = row * CFG.cellH + CFG.cellH * 0.5;
        for (let col = c0; col < c1; col++) {
          const cx = col * CFG.cellW + CFG.cellW * 0.5;
          if (!pointInPolygon(cx, cy, polyX, polyY, n)) continue;
          const idx = row * gridCols + col;
          if (peak > imprintStrength[idx]) imprintStrength[idx] = peak;
        }
      }
    }

    function rebuildFaceMask() {
      faceMask.fill(0);
      if (!hasFace) return;

      const n = FACE_OVAL.length;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i < n; i++) {
        const fx = faceX[i];
        const fy = faceY[i];
        if (fx < minX) minX = fx;
        if (fy < minY) minY = fy;
        if (fx > maxX) maxX = fx;
        if (fy > maxY) maxY = fy;
      }

      const c0 = Math.max(0, Math.floor(minX / CFG.cellW) - 1);
      const c1 = Math.min(gridCols, Math.ceil(maxX / CFG.cellW) + 2);
      const r0 = Math.max(0, Math.floor(minY / CFG.cellH) - 1);
      const r1 = Math.min(gridRows, Math.ceil(maxY / CFG.cellH) + 2);

      for (let row = r0; row < r1; row++) {
        const cy = row * CFG.cellH + CFG.cellH * 0.5;
        for (let col = c0; col < c1; col++) {
          const cx = col * CFG.cellW + CFG.cellW * 0.5;
          if (pointInPolygon(cx, cy, faceX, faceY, n)) {
            faceMask[row * gridCols + col] = 1;
          }
        }
      }
    }

    function rebuildImprintField() {
      imprintStrength.fill(0);
      handImprintGrid.fill(0);

      if (hasFace && faceLmX && faceLmY) {
        fillPolygonStrength(faceX, faceY, FACE_OVAL.length, 0.5);
        stampDisc(magNoseX, magNoseY, CFG.faceNoseRadius * 0.9, 0.95);
        stampDisc(magLeftEyeX, magLeftEyeY, CFG.faceEyeRadius * 0.9, 0.92);
        stampDisc(magRightEyeX, magRightEyeY, CFG.faceEyeRadius * 0.9, 0.92);
        stampDisc(magMouthX, magMouthY, CFG.faceMouthRadius * 0.9 * mouthOpenMul(), 1);
      }

      for (let h = 0; h < MAX_HANDS; h++) {
        if (!handTracked[h] || handPresence[h] <= 0.04) continue;

        const xs = handLmX[h];
        const ys = handLmY[h];

        for (let e = 0; e < HAND_EDGES.length; e += 2) {
          const a = HAND_EDGES[e];
          const b = HAND_EDGES[e + 1];
          const lo = a < b ? a : b;
          const hi = a < b ? b : a;
          const palmSeg = (lo === 0 && hi >= 5) || (lo === 5 && hi === 9) || (lo === 9 && hi === 13) || (lo === 13 && hi === 17);
          const segR = palmSeg ? CFG.handPalmSegRadius : CFG.handSegRadius;
          const peak = palmSeg ? 0.92 : 1;
          stampSegmentToGrid(handImprintGrid, xs[a], ys[a], xs[b], ys[b], segR, peak);
        }

        for (let i = 0; i < HAND_LM_COUNT; i++) {
          stampDiscToGrid(handImprintGrid, xs[i], ys[i], HAND_LM_RADII[i], HAND_LM_PEAK[i]);
        }

        for (let i = 0; i < HAND_TIPS.length; i++) {
          const p = HAND_TIPS[i];
          stampDiscToGrid(handImprintGrid, xs[p], ys[p], 18, 1);
        }
      }
    }

    function cellAt(x, y) {
      const col = (x * INV_CELL_W) | 0;
      const row = (y * INV_CELL_H) | 0;
      if (col < 0 || row < 0 || col >= gridCols || row >= gridRows) return -1;
      return row * gridCols + col;
    }

    function maskAtCell(idx) {
      return idx >= 0 ? faceMask[idx] : 0;
    }

    function imprintAtCell(idx) {
      return idx >= 0 ? imprintStrength[idx] : 0;
    }

    function updateFaceFieldSize() {
      let sum = 0;
      let maxSq = 0;
      for (let i = 0; i < FACE_OVAL.length; i++) {
        const dx = faceX[i] - centroidX;
        const dy = faceY[i] - centroidY;
        const dSq = dx * dx + dy * dy;
        sum += Math.sqrt(dSq);
        if (dSq > maxSq) maxSq = dSq;
      }
      faceRadius = (sum / FACE_OVAL.length) * CFG.faceScaleBoost;
      // Every point on the face-oval polygon lies within faceRadiusMax of the
      // centroid, so it bounds the reach of both the boundary push and the
      // stabilization zone -> lets updateParticles cull far-away particles.
      faceRadiusMax = Math.sqrt(maxSq);
      fieldRadius = faceRadius * CFG.fieldRadiusMul;
      fieldRange = faceRadius * CFG.fieldRangeMul;
      fieldRangeSq = fieldRange * fieldRange;
    }

    function smoothFalloff(t) {
      const u = t <= 0 ? 0 : t >= 1 ? 1 : t;
      return u * u * (3 - 2 * u);
    }

    // Maps a centroid speed (px/ms) to a displacement multiplier >= 1.
    function velBoost(speed) {
      let r = speed / CFG.velRef;
      if (r < 0) r = 0;
      else if (r > CFG.velRatioMax) r = CFG.velRatioMax;
      return 1 + r * CFG.velExaggerate;
    }

    function wideFalloff(t, pow) {
      const u = t <= 0 ? 0 : t >= 1 ? 1 : t;
      return Math.pow(u, pow ?? CFG.fieldFalloffPow);
    }

    function mouthOpenMul() {
      return 1 + mouthOpenNorm * CFG.mouthDispMul;
    }

    function updateMouthOpenness() {
      if (!faceLmX || !hasFace) {
        mouthOpenNorm += (0 - mouthOpenNorm) * CFG.mouthSmooth;
        return;
      }

      const odx = faceLmX[13] - faceLmX[14];
      const ody = faceLmY[13] - faceLmY[14];
      const openDist = Math.sqrt(odx * odx + ody * ody);
      const ref = Math.max(faceRadius * CFG.mouthOpenRef, 8);
      const raw = (openDist - ref * 0.45) / (ref * 1.05);
      const target = raw <= 0 ? 0 : raw > 1 ? 1 : raw;
      mouthOpenNorm += (target - mouthOpenNorm) * CFG.mouthSmooth;
    }

    function magneticField(px, py, cx, cy, radius, fieldK, inside, opts = null) {
      const dx = px - cx;
      const dy = py - cy;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);
      const feather = opts?.feather ?? CFG.fieldFeather;
      const outer = radius * feather;
      if (dist >= outer) return { fx: 0, fy: 0 };

      const t = 1 - dist / outer;
      const falloff = opts?.wide
        ? wideFalloff(t, opts.falloffPow)
        : smoothFalloff(t <= 0 ? 0 : t > 1 ? 1 : t);
      if (falloff <= 0) return { fx: 0, fy: 0 };

      const distSafe = dist > 0.5 ? dist : 0.5;
      const boost = inside ? (opts?.insideBoost ?? CFG.insideBoost) : 1;
      const strength = falloff * fieldK * boost * (opts?.mul ?? 1);

      return {
        fx: (dx / distSafe) * strength,
        fy: (dy / distSafe) * strength
      };
    }

    function closestPointOnSegment(px, py, x0, y0, x1, y1) {
      const dx = x1 - x0;
      const dy = y1 - y0;
      const len2 = dx * dx + dy * dy;
      if (len2 < 0.01) return { x: x0, y: y0 };
      let t = ((px - x0) * dx + (py - y0) * dy) / len2;
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      return { x: x0 + t * dx, y: y0 + t * dy };
    }

    // Signed distance from a point to the hand "skeleton" (capsule bones +
    // landmark discs). Negative = inside the hand. The returned distance (used
    // for strength/falloff) is the true min over the whole skeleton, so the hand
    // SHAPE is preserved. The outward normal, however, is a smooth
    // distance-weighted blend of the outward directions from every nearby
    // bone/landmark instead of the direction away from the single nearest one.
    // The nearest feature flips abruptly as a letter passes between fingers or
    // joints, and that direction flip is what makes letters wiggle; blending it
    // makes the normal change continuously, the hand analogue of the face's
    // smooth centroid-radial normal (nearestFaceBoundary), so letters get a nice
    // falloff and settle instead of jittering.
    function nearestHandSurface(px, py, h) {
      const xs = handLmX[h];
      const ys = handLmY[h];
      let bestSd = Infinity;
      const blend = CFG.handNormalBlend;
      const invBlend = 1 / blend;
      let nbx = 0;
      let nby = 0;
      let wsum = 0;

      for (let e = 0; e < HAND_EDGES.length; e += 2) {
        const a = HAND_EDGES[e];
        const b = HAND_EDGES[e + 1];
        const lo = a < b ? a : b;
        const hi = a < b ? b : a;
        const palmSeg = (lo === 0 && hi >= 5) || (lo === 5 && hi === 9) ||
          (lo === 9 && hi === 13) || (lo === 13 && hi === 17);
        const segR = (palmSeg ? CFG.handPalmSegRadius : CFG.handSegRadius) * CFG.handFieldSegMul;
        const cp = closestPointOnSegment(px, py, xs[a], ys[a], xs[b], ys[b]);
        const ex = px - cp.x;
        const ey = py - cp.y;
        const d = Math.sqrt(ex * ex + ey * ey);
        const sd = d - segR;
        if (sd < bestSd) bestSd = sd;
        const surf = sd > 0 ? sd : 0;
        if (d > 0.01 && surf < blend) {
          const w = (1 - surf * invBlend);
          const ws = w * w;
          const inv = ws / d;
          nbx += ex * inv;
          nby += ey * inv;
          wsum += ws;
        }
      }

      for (let i = 0; i < HAND_LM_COUNT; i++) {
        const rad = HAND_LM_RADII[i] * CFG.handFieldLmMul;
        const ex = px - xs[i];
        const ey = py - ys[i];
        const d = Math.sqrt(ex * ex + ey * ey);
        const sd = d - rad;
        if (sd < bestSd) bestSd = sd;
        const surf = sd > 0 ? sd : 0;
        if (d > 0.01 && surf < blend) {
          const w = (1 - surf * invBlend);
          const ws = w * w;
          const inv = ws / d;
          nbx += ex * inv;
          nby += ey * inv;
          wsum += ws;
        }
      }

      const nl = Math.sqrt(nbx * nbx + nby * nby);
      if (nl > 0.0001) {
        handNormX = nbx / nl;
        handNormY = nby / nl;
      } else {
        let nx = px - handCentroidX[h];
        let ny = py - handCentroidY[h];
        const cl = Math.sqrt(nx * nx + ny * ny) || 1;
        handNormX = nx / cl;
        handNormY = ny / cl;
      }

      return bestSd;
    }

    function faceHomeInRange(hx, hy) {
      const margin = fieldRange * CFG.faceRangeMargin;
      const n = FACE_OVAL.length;
      for (let i = 0; i < n; i++) {
        const dx = hx - faceX[i];
        const dy = hy - faceY[i];
        const reach = CFG.faceSegRadius + margin;
        if (dx * dx + dy * dy < reach * reach) return true;
      }
      const fdx = hx - centroidX;
      const fdy = hy - centroidY;
      return fdx * fdx + fdy * fdy < fieldRangeSq;
    }

    function nearestFaceBoundary(px, py) {
      const n = FACE_OVAL.length;
      let bestDistSq = Infinity;
      let bx = centroidX;
      let by = centroidY;

      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        const cp = closestPointOnSegment(px, py, faceX[i], faceY[i], faceX[j], faceY[j]);
        const dx = px - cp.x;
        const dy = py - cp.y;
        const dSq = dx * dx + dy * dy;
        if (dSq < bestDistSq) {
          bestDistSq = dSq;
          bx = cp.x;
          by = cp.y;
        }
      }

      let ox = bx - centroidX;
      let oy = by - centroidY;
      const ol = Math.sqrt(ox * ox + oy * oy);
      if (ol < 0.01) {
        ox = px - centroidX;
        oy = py - centroidY;
        const pl = Math.sqrt(ox * ox + oy * oy) || 1;
        ox /= pl;
        oy /= pl;
      } else {
        ox /= ol;
        oy /= ol;
      }

      return {
        bx, by,
        dist: Math.sqrt(bestDistSq),
        ox, oy
      };
    }

    function facePointInside(px, py) {
      if (!hasFace) return false;
      return pointInPolygon(px, py, faceX, faceY, FACE_OVAL.length);
    }

    function faceFeatureFields(px, py, fieldK, insideFace) {
      if (!faceLmX) return { fx: 0, fy: 0 };

      const mouthMul = mouthOpenMul();
      const faceOpts = { wide: true, feather: CFG.faceFieldFeather, insideBoost: CFG.insideBoost };
      const nodes = [
        { cx: magNoseX, cy: magNoseY, r: CFG.faceNoseRadius, k: 0.92 },
        { cx: magLeftEyeX, cy: magLeftEyeY, r: CFG.faceEyeRadius, k: 0.82 },
        { cx: magRightEyeX, cy: magRightEyeY, r: CFG.faceEyeRadius, k: 0.82 },
        { cx: magMouthX, cy: magMouthY, r: CFG.faceMouthRadius * mouthMul, k: 0.95 * mouthMul }
      ];

      let fx = 0;
      let fy = 0;

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        const f = magneticField(px, py, n.cx, n.cy, n.r, fieldK * n.k, insideFace, faceOpts);
        fx += f.fx;
        fy += f.fy;
      }

      return { fx, fy };
    }

    function faceMagneticField(px, py, insideFace, boundary) {
      const fieldK = CFG.fieldK * CFG.faceFieldMul * faceVelBoost;
      const mouthMul = mouthOpenMul();
      const clearance = CFG.faceClearMargin * mouthMul;
      const outer = (clearance + CFG.faceSegRadius * 0.45) * CFG.faceFieldFeather;
      let fx = 0;
      let fy = 0;

      if (insideFace || boundary.dist < outer) {
        // Continuous, smooth outward field along a stable radial normal.
        // Deep inside the face the push is strong (clears the interior); it
        // ramps smoothly down to a gentle edge push at the boundary and tapers
        // to exactly zero at the outer radius. No cliff and no inside/outside
        // discontinuity, so letters never oscillate across a hard edge and
        // neighbours get near-identical pushes -> they spread instead of clump.
        let strength;
        if (insideFace) {
          const depth = clearance > 0 ? Math.min(boundary.dist / clearance, 1) : 1;
          const boost = CFG.faceEdgePush +
            (CFG.insideBoost - CFG.faceEdgePush) * smoothFalloff(depth);
          strength = fieldK * boost * mouthMul;
        } else {
          const t = 1 - boundary.dist / outer;
          strength = smoothFalloff(t) * fieldK * CFG.faceEdgePush * mouthMul;
        }

        fx += boundary.ox * strength;
        fy += boundary.oy * strength;
      }

      const feat = faceFeatureFields(px, py, fieldK, insideFace);
      fx += feat.fx;
      fy += feat.fy;

      return { fx, fy };
    }

    // NOTE: the hand magnetic field is inlined into updateParticles' per-particle
    // loop so it can reuse the signed-distance + normal computed once per hand.
    // The continuous profile it applies (strong deep inside the hand, ramping to
    // a gentle surface push, tapering to zero at the outer reach) matches the
    // face field's, so neighbouring letters get near-identical pushes and spread
    // out instead of clumping.

    function updateHandFieldSize(h) {
      handFieldRadius[h] = handRadius[h] * CFG.handRadiusMul;
      handFieldRange[h] = handRadius[h] * CFG.handRangeMul;
    }

    function weightBucket(w) {
      if (w < 175) return 0;
      if (w < 350) return 1;
      if (w < 550) return 2;
      if (w < 750) return 3;
      return 4;
    }

    function rebuildMasks() {
      rebuildFaceMask();
      rebuildImprintField();
      for (let i = 0; i < count; i++) {
        const idx = cellIdx[i];
        faceImpHome[i] = imprintStrength[idx];
        handImpHome[i] = handImprintGrid[idx];
        impHome[i] = faceImpHome[i] + handImpHome[i];
      }
    }

    function runHandDetection() {
      handActive.fill(0);
      if (!handLandmarker) return;

      handDetectFrame++;
      const runDetect = handDetectFrame % CFG.handDetectStride === 0;

      if (!runDetect) {
        for (let h = 0; h < MAX_HANDS; h++) {
          if (handInit[h] && handPresence[h] > 0.04 && handTracked[h]) handActive[h] = 1;
        }
        return;
      }

      handTracked.fill(0);

      try {
        const result = handLandmarker.detectForVideo(video, detectTimestamp);
        const hands = result.landmarks || [];
        const t = CFG.pointSmooth;
        const nowMs = performance.now();

        for (let h = 0; h < MAX_HANDS; h++) {
          const lms = hands[h];
          if (!lms) continue;

          let cx = 0;
          let cy = 0;
          for (let i = 0; i < HAND_PALM_IDX.length; i++) {
            const lm = lms[HAND_PALM_IDX[i]];
            const mapped = mapLandmarkToStage(lm.x, lm.y);
            cx += mapped.x;
            cy += mapped.y;
          }
          cx /= HAND_PALM_IDX.length;
          cy /= HAND_PALM_IDX.length;

          if (!handLandmarksOnStage(lms) && !pointOnStage(cx, cy)) continue;

          handPresence[h] = Math.min(1, handPresence[h] + CFG.handFadeIn);
          handTracked[h] = 1;

          const xs = handLmX[h];
          const ys = handLmY[h];

          if (!handInit[h]) {
            handCentroidX[h] = cx;
            handCentroidY[h] = cy;
            handInit[h] = 1;
            for (let i = 0; i < lms.length; i++) {
              const mapped = mapLandmarkToStage(lms[i].x, lms[i].y);
              xs[i] = mapped.x;
              ys[i] = mapped.y;
            }
          } else {
            handCentroidX[h] += (cx - handCentroidX[h]) * t;
            handCentroidY[h] += (cy - handCentroidY[h]) * t;
            for (let i = 0; i < lms.length; i++) {
              const mapped = mapLandmarkToStage(lms[i].x, lms[i].y);
              xs[i] += (mapped.x - xs[i]) * t;
              ys[i] += (mapped.y - ys[i]) * t;
            }
          }

          if (handLastMs[h] === 0) {
            handSpeed[h] = 0;
          } else {
            const hdt = Math.max(nowMs - handLastMs[h], 1);
            const dcx = handCentroidX[h] - handPrevCX[h];
            const dcy = handCentroidY[h] - handPrevCY[h];
            const inst = Math.sqrt(dcx * dcx + dcy * dcy) / hdt;
            handSpeed[h] += (inst - handSpeed[h]) * CFG.velSmooth;
          }
          handLastMs[h] = nowMs;
          handPrevCX[h] = handCentroidX[h];
          handPrevCY[h] = handCentroidY[h];
          handVelBoost[h] = velBoost(handSpeed[h]);

          let spread = 0;
          for (let i = 0; i < lms.length; i++) {
            const sdx = xs[i] - handCentroidX[h];
            const sdy = ys[i] - handCentroidY[h];
            spread += Math.sqrt(sdx * sdx + sdy * sdy);
          }
          handRadius[h] = (spread / lms.length) * CFG.handScaleBoost;
          updateHandFieldSize(h);
          handActive[h] = 1;
        }

        for (let h = 0; h < MAX_HANDS; h++) {
          if (handInit[h] && !handTracked[h]) masksDirty = true;
        }
      } catch (err) {
        handActive.fill(0);
        handTracked.fill(0);
        console.error(err);
      }
    }

    function runTracking() {
      if (video.readyState < 2) return;

      const nowMs = performance.now();
      if (nowMs - lastDetectMs < DETECT_MIN_MS) return;   // cap detection rate

      const frameTime = video.currentTime;
      if (frameTime === lastVideoTime) return;
      lastVideoTime = frameTime;
      lastDetectMs = nowMs;

      viewportMap = updateViewportMap();
      if (!viewportMap) return;

      detectTimestamp = Math.max(detectTimestamp + 33, nowMs);

      // Alternate: one model per tick so a frame never runs face + hand together.
      detCycle ^= 1;

      if (faceLandmarker && detCycle === 0) {
        try {
          const result = faceLandmarker.detectForVideo(video, detectTimestamp);
          const lms = result.faceLandmarks?.[0];

          if (lms) {
            const lmCount = lms.length;
            if (!faceLmX || faceLmX.length !== lmCount) {
              faceLmX = new Float32Array(lmCount);
              faceLmY = new Float32Array(lmCount);
              faceX = new Float32Array(FACE_OVAL.length);
              faceY = new Float32Array(FACE_OVAL.length);
            }
            const t = CFG.pointSmooth;

            for (let i = 0; i < FACE_FEATURE_IDX.length; i++) {
              const fi = FACE_FEATURE_IDX[i];
              const mapped = mapLandmarkToStage(lms[fi].x, lms[fi].y);
              if (!faceInit) {
                faceLmX[fi] = mapped.x;
                faceLmY[fi] = mapped.y;
              } else {
                faceLmX[fi] += (mapped.x - faceLmX[fi]) * t;
                faceLmY[fi] += (mapped.y - faceLmY[fi]) * t;
              }
            }

            for (let i = 0; i < FACE_OVAL.length; i++) {
              const p = FACE_OVAL[i];
              faceX[i] = faceLmX[p];
              faceY[i] = faceLmY[p];
            }

            faceInit = true;
            centroidX = 0;
            centroidY = 0;
            for (let i = 0; i < FACE_OVAL.length; i++) {
              centroidX += faceX[i];
              centroidY += faceY[i];
            }
            centroidX /= FACE_OVAL.length;
            centroidY /= FACE_OVAL.length;

            const fdt = Math.max(nowMs - faceLastMs, 1);
            faceLastMs = nowMs;
            if (facePrevValid) {
              const dcx = centroidX - facePrevCX;
              const dcy = centroidY - facePrevCY;
              const inst = Math.sqrt(dcx * dcx + dcy * dcy) / fdt;
              faceSpeed += (inst - faceSpeed) * CFG.velSmooth;
            }
            facePrevCX = centroidX;
            facePrevCY = centroidY;
            facePrevValid = true;
            faceVelBoost = velBoost(faceSpeed);

            const nose = featureCentroid(NOSE, faceLmX, faceLmY);
            magNoseX = nose.x;
            magNoseY = nose.y;
            const leftEye = featureCentroid(LEFT_EYE, faceLmX, faceLmY);
            magLeftEyeX = leftEye.x;
            magLeftEyeY = leftEye.y;
            const rightEye = featureCentroid(RIGHT_EYE, faceLmX, faceLmY);
            magRightEyeX = rightEye.x;
            magRightEyeY = rightEye.y;
            const mouth = featureCentroid(LIPS, faceLmX, faceLmY);
            magMouthX = mouth.x;
            magMouthY = mouth.y;

            updateFaceFieldSize();
            updateMouthOpenness();
            hasFace = true;
          } else {
            hasFace = false;
            faceInit = false;
            facePrevValid = false;
            faceSpeed = 0;
            faceVelBoost = 1;
            updateMouthOpenness();
          }
        } catch (err) {
          hasFace = false;
          console.error(err);
        }
      }

      if (detCycle !== 0) runHandDetection();
      masksDirty = true;
    }

    function updateParticles(dtMs) {
      const dt = Math.min(dtMs, 32) * 0.032;

      noiseTime += dtMs * CFG.windTimeSpeed;
      const gust = 1 + CFG.windGustAmp * valueNoise(noiseTime * 1.7, 37.2);
      const windK = CFG.windK * gust;
      const windKY = CFG.windKY * gust;
      const invStageH = stageH > 0 ? 1 / stageH : 0;

      if (masksDirty) {
        rebuildMasks();
        masksDirty = false;
      }

      for (let i = 0; i < count; i++) {
        prevDispX[i] = x[i] - px[i];
        prevDispY[i] = y[i] - py[i];
      }

      const hasFaceNow = hasFace;
      const mouthMul = mouthOpenMul();

      // Motion-driven exaggeration: fast head/hand movement raises the caps so
      // letters get flung further; the field strengths are boosted per-source
      // below (faceVelBoost / handVelBoost[h]).
      const faceB = hasFaceNow ? faceVelBoost : 1;
      let handB = 1;
      for (let h = 0; h < MAX_HANDS; h++) {
        if (handInit[h] && handPresence[h] > 0.04 && handVelBoost[h] > handB) {
          handB = handVelBoost[h];
        }
      }
      const motionBoost = faceB > handB ? faceB : handB;

      const maxDisp = CFG.maxDisp * mouthMul * motionBoost;
      const invMaxDisp = 1 / maxDisp;
      const springK = CFG.springK;
      const springKRest = CFG.springKRest;
      const springKCoast = CFG.springKCoast;
      const damping = CFG.damping;
      const dampingRest = CFG.dampingRest;
      const dampingCoast = CFG.dampingCoast;
      const restDrag = CFG.restDrag;
      const returnSnap = CFG.returnSnap;
      const coastMinDisp = CFG.coastMinDisp;
      const coastMinSpeed = CFG.coastMinSpeed;
      const maxAccel = CFG.maxAccel * motionBoost;
      const maxSpeed = CFG.maxSpeed * motionBoost;
      const dampingFace = CFG.dampingFace;
      const minW = CFG.minWeight;
      const wSpan = CFG.maxWeight - minW;
      const faceOuter = (CFG.faceClearMargin * mouthMul + CFG.faceSegRadius * 0.45) * CFG.faceFieldFeather;
      // Broad-phase radius: beyond this a particle can be neither inside the
      // face nor within faceOuter/boundaryStabilizeZone of the oval, so all the
      // expensive per-segment boundary math can be skipped (lossless cull).
      const faceCull = faceRadiusMax +
        (faceOuter > CFG.boundaryStabilizeZone ? faceOuter : CFG.boundaryStabilizeZone);
      const faceCullSq = faceCull * faceCull;
      const handInfluence = totalHandInfluence();
      const handAffecting = handInfluence > 0.04;

      for (let i = 0; i < count; i++) {
        const homeX = px[i];
        const homeY = py[i];
        const posX = x[i];
        const posY = y[i];

        // --- Face proximity: compute the nearest-boundary once and reuse it
        // for the push test, boundary stabilization, and the magnetic field. ---
        let insideFaceNow = false;
        let faceBoundary = null;
        let pushedByFace = false;
        if (hasFaceNow) {
          const dcx = posX - centroidX;
          const dcy = posY - centroidY;
          if (dcx * dcx + dcy * dcy < faceCullSq) {
            insideFaceNow = facePointInside(posX, posY);
            faceBoundary = nearestFaceBoundary(posX, posY);
            pushedByFace = insideFaceNow || faceBoundary.dist < faceOuter;
          }
        }

        // --- Hand proximity: compute signed distance + normal once per hand,
        // stored in scratch for reuse across every pass below. ---
        let pushedByHand = false;
        let insideHandNow = false;
        if (handAffecting) {
          for (let h = 0; h < MAX_HANDS; h++) {
            handInRangeScratch[h] = 0;
            const presence = handPresence[h];
            if (presence <= 0.04 || !handInit[h]) continue;
            const dxc = posX - handCentroidX[h];
            const dyc = posY - handCentroidY[h];
            const br = handFieldRange[h] + CFG.handClearMargin;
            if (dxc * dxc + dyc * dyc > br * br) continue;
            const sd = nearestHandSurface(posX, posY, h);
            handSdScratch[h] = sd;
            handNxScratch[h] = handNormX;
            handNyScratch[h] = handNormY;
            handInRangeScratch[h] = 1;
            if (sd < CFG.handClearMargin) {
              pushedByHand = true;
              if (sd <= 0) insideHandNow = true;
            }
          }
        }

        const beingPushed = pushedByFace || pushedByHand;

        const ddx = posX - homeX;
        const ddy = posY - homeY;
        const dispNow = Math.sqrt(ddx * ddx + ddy * ddy);
        const speedBefore = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i]);
        const coasting = !beingPushed && dispNow > coastMinDisp && speedBefore > coastMinSpeed;

        let nearBoundary = false;
        let boundaryDist = Infinity;
        if (faceBoundary && faceBoundary.dist < CFG.boundaryStabilizeZone) {
          nearBoundary = true;
          boundaryDist = faceBoundary.dist;
        }
        if (handAffecting) {
          for (let h = 0; h < MAX_HANDS; h++) {
            if (!handInRangeScratch[h]) continue;
            const raw = handSdScratch[h];
            const sd = raw < 0 ? -raw : raw;
            if (sd < CFG.boundaryStabilizeZone) {
              nearBoundary = true;
              if (sd < boundaryDist) boundaryDist = sd;
            }
          }
        }

        let ax;
        let ay;
        let damp;

        if (beingPushed) {
          let spring = springK;
          if (insideFaceNow || insideHandNow) spring *= 0.15;
          damp = pushedByFace ? dampingFace : damping;
          ax = (homeX - posX) * spring;
          ay = (homeY - posY) * spring;

          if (pushedByFace) {
            const field = faceMagneticField(posX, posY, insideFaceNow, faceBoundary);
            ax += field.fx;
            ay += field.fy;
          }

          if (pushedByHand) {
            for (let h = 0; h < MAX_HANDS; h++) {
              if (!handInRangeScratch[h]) continue;
              const sd = handSdScratch[h];
              const reach = CFG.handClearMargin;
              if (sd >= reach) continue;
              let strength;
              if (sd <= 0) {
                const depth = CFG.handInsideDepth > 0
                  ? Math.min(-sd / CFG.handInsideDepth, 1)
                  : 1;
                const boost = CFG.handEdgePush +
                  (CFG.insideBoost - CFG.handEdgePush) * smoothFalloff(depth);
                strength = CFG.handFieldK * boost;
              } else {
                const t = 1 - sd / reach;
                strength = smoothFalloff(t) * CFG.handFieldK * CFG.handEdgePush;
              }
              strength *= handPresence[h] * handVelBoost[h];
              ax += handNxScratch[h] * strength;
              ay += handNyScratch[h] * strength;
            }
          }

          const accelMag = Math.sqrt(ax * ax + ay * ay);
          if (accelMag > maxAccel) {
            const s = maxAccel / accelMag;
            ax *= s;
            ay *= s;
          }

          const forceBlend = CFG.forceSmooth;
          smAx[i] += (ax - smAx[i]) * forceBlend;
          smAy[i] += (ay - smAy[i]) * forceBlend;
          ax = smAx[i];
          ay = smAy[i];
        } else {
          smAx[i] *= CFG.forceDecay;
          smAy[i] *= CFG.forceDecay;
          let spring = coasting ? springKCoast : springKRest;
          if (!handAffecting && !pushedByFace && dispNow > 0.5) {
            spring *= 1 + Math.min(dispNow / 55, 0.9);
          }
          damp = coasting ? dampingCoast : dampingRest;
          ax = (homeX - posX) * spring - vx[i] * restDrag;
          ay = (homeY - posY) * spring - vy[i] * restDrag;
        }

        const nb = i * 4;
        let nax = 0;
        let nay = 0;
        let ncount = 0;
        for (let k = 0; k < 4; k++) {
          const n = neighborIdx[nb + k];
          if (n < 0) continue;
          nax += prevDispX[n];
          nay += prevDispY[n];
          ncount++;
        }
        if (ncount > 0) {
          const inv = 1 / ncount;
          ax += (nax * inv - prevDispX[i]) * CFG.rippleK;
          ay += (nay * inv - prevDispY[i]) * CFG.rippleK;
        }

        const wind = windForceAt(homeX, homeY);
        const windBias = CFG.windLowerBias + (1 - CFG.windLowerBias) * (homeY * invStageH);
        ax += wind.fx * windK * windBias;
        ay += wind.fy * windKY * windBias;

        vx[i] = (vx[i] + ax * dt) * damp;
        vy[i] = (vy[i] + ay * dt) * damp;

        if (nearBoundary) {
          const stabilizeFactor = boundaryDist / CFG.boundaryStabilizeZone;
          const extraDamp = 1 - (1 - CFG.boundaryStabilizeDamp) * (1 - stabilizeFactor);
          vx[i] *= extraDamp;
          vy[i] *= extraDamp;
        }

        let speed = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i]);
        if (speed > maxSpeed) {
          const scale = maxSpeed / speed;
          vx[i] *= scale;
          vy[i] *= scale;
          speed = maxSpeed;
        }

        x[i] = posX + vx[i] * dt;
        y[i] = posY + vy[i] * dt;

        if (!beingPushed) {
          const rdx = homeX - x[i];
          const rdy = homeY - y[i];
          const restDisp = Math.sqrt(rdx * rdx + rdy * rdy);
          const restSpeed = Math.sqrt(vx[i] * vx[i] + vy[i] * vy[i]);
          if (restDisp < CFG.settleDist && restSpeed < CFG.settleSpeed) {
            x[i] += (homeX - x[i]) * CFG.settleNudge;
            y[i] += (homeY - y[i]) * CFG.settleNudge;
            vx[i] *= 0.92;
            vy[i] *= 0.92;
          }
        }

        const dispLimit = maxDisp;
        const ldx = x[i] - homeX;
        const ldy = y[i] - homeY;
        const disp = Math.sqrt(ldx * ldx + ldy * ldy);
        if (disp > dispLimit) {
          const scale = dispLimit / disp;
          x[i] = homeX + (x[i] - homeX) * scale;
          y[i] = homeY + (y[i] - homeY) * scale;
          vx[i] *= 0.88;
          vy[i] *= 0.88;
        }

        const dispNormVis = disp >= dispLimit ? 1 : disp / dispLimit;
        const handImpVal = handAffecting ? handImpHome[i] : 0;
        const impVal = faceImpHome[i] + handImpVal;
        const impCurve = impVal > 0 ? Math.pow(impVal, 0.65) : 0;
        const dispTarget = minW + wSpan * dispNormVis * dispNormVis;
        const imprintTarget = minW + wSpan * impCurve;
        const target = dispTarget > imprintTarget ? dispTarget : imprintTarget;
        const impFollow = handImpVal > 0.08
          ? CFG.imprintFollow
          : (handImpHome[i] > 0.08 ? CFG.imprintReleaseFollow : CFG.weightFollow);
        weight[i] += (target - weight[i]) * impFollow;

        const affect = impVal > dispNormVis * dispNormVis * 0.75 ? impVal : dispNormVis * dispNormVis * 0.75;
        drawAlpha[i] = CFG.letterAlphaRest -
          affect * (CFG.letterAlphaRest - CFG.letterAlphaAffected);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, stageW, stageH);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const buckets = BUCKET_POOL;
      for (let b = 0; b < 5; b++) buckets[b].length = 0;
      for (let i = 0; i < count; i++) {
        buckets[weightBucket(weight[i])].push(i);
      }

      let lastAlpha = -1;
      for (let b = 0; b < 5; b++) {
        const list = buckets[b];
        if (!list.length) continue;
        ctx.font = FONT_STRS[b];
        for (let k = 0, n = list.length; k < n; k++) {
          const i = list[k];
          const alpha = drawAlpha[i];
          if (alpha !== lastAlpha) {
            ctx.globalAlpha = alpha;
            lastAlpha = alpha;
          }
          ctx.fillText(charStr(chars[i]), x[i], y[i]);
        }
      }

      ctx.globalAlpha = 1;
      ctx.font = FONT_STRS[0];
      for (let i = 0; i < pinnedCount; i++) {
        ctx.fillText(charStr(pinChars[i]), pinX[i], pinY[i]);
      }
    }

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = now - lastFrameTime;
      lastFrameTime = now;
      runTracking();
      updateHandInfluence(dt);
      updateParticles(dt);
      draw();
    }

    async function boot() {
      if (!window.isSecureContext) return;

      await loadFont();
      resizeStage();

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        video.srcObject = stream;
        await new Promise((res, rej) => { video.onloadedmetadata = res; video.onerror = rej; });
        await video.play();
        viewportMap = updateViewportMap();

        const { FaceLandmarker, HandLandmarker, FilesetResolver } = await import(`${MP_BASE}`);
        const vision = await FilesetResolver.forVisionTasks(`${MP_BASE}/wasm`);
        const faceOpts = {
          baseOptions: { modelAssetPath: FACE_MODEL_URL, delegate: 'GPU' },
          runningMode: 'VIDEO',
          numFaces: 1,
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: false
        };
        const handOpts = {
          baseOptions: { modelAssetPath: HAND_MODEL_URL, delegate: 'GPU' },
          runningMode: 'VIDEO',
          numHands: MAX_HANDS
        };
        try {
          faceLandmarker = await FaceLandmarker.createFromOptions(vision, faceOpts);
          handLandmarker = await HandLandmarker.createFromOptions(vision, handOpts);
        } catch (_) {
          faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            ...faceOpts,
            baseOptions: { modelAssetPath: FACE_MODEL_URL, delegate: 'CPU' }
          });
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            ...handOpts,
            baseOptions: { modelAssetPath: HAND_MODEL_URL, delegate: 'CPU' }
          });
        }
      } catch (err) {
        console.error(err);
        return;
      }

      animate(performance.now());
    }

    window.addEventListener('resize', () => {
      resizeStage();
      hasFace = false;
      faceInit = false;
      facePrevValid = false;
      faceSpeed = 0;
      faceVelBoost = 1;
      mouthOpenNorm = 0;
      handActive.fill(0);
      handPresence.fill(0);
      handTracked.fill(0);
      handInit.fill(0);
      handSpeed.fill(0);
      handLastMs.fill(0);
      handVelBoost.fill(1);
      masksDirty = true;
    });

    boot();
  </script>
</body>
