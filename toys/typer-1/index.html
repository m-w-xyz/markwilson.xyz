<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer 01</title>
    <!-- Mediapipe Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        @font-face {
            font-family: 'Exposure';
            src: url('205TF_Exposure_Trial/ExposureTrialVAR.ttf') format('truetype-variations');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            background-color: #CCBBAF;
            font-family: 'Exposure', Arial, sans-serif;
            color: #4D3E3E;
            overflow: hidden;
            position: relative;
        }
        
        .webcam-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.7;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror the webcam */
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
            background-color: rgba(204, 187, 175, 0.3);
        }
        
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        
        .display-text {
            font-size: clamp(3rem, 15vw, 20rem);
            line-height: 1.1;
            text-align: center;
            max-width: 95%;
            word-wrap: break-word;
            font-weight: normal;
            transition: font-size 0.3s ease;
        }
        
        .letter {
            display: inline-block;
            font-variation-settings: 'EXPO' 0;
            transition: font-variation-settings 0.2s ease;
            position: relative;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            box-sizing: border-box;
            background-color: rgba(204, 187, 175, 0.5);
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
        }
        
        .slider-label {
            margin-right: 10px;
            font-size: 14px;
            min-width: 60px;
        }
        
        .slider {
            flex-grow: 1;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(77, 62, 62, 0.3);
            outline: none;
            border-radius: 5px;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #4D3E3E;
            cursor: pointer;
        }
        
        .slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #4D3E3E;
            cursor: pointer;
            border: none;
        }
        
        .slider-value {
            margin-left: 10px;
            font-size: 14px;
            min-width: 40px;
            text-align: left;
        }
        
        .toggle-button {
            padding: 8px 16px;
            background-color: #4D3E3E;
            color: #CCBBAF;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Exposure', Arial, sans-serif;
            font-size: 14px;
            margin-bottom: 10px;
            transition: background-color 0.2s ease;
        }
        
        .toggle-button:hover {
            background-color: #3a2e2e;
        }
        
        .input-container {
            width: 100%;
            padding: 10px 20px 20px;
            box-sizing: border-box;
            background-color: rgba(204, 187, 175, 0.5);
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            font-size: 18px;
            border: 2px solid #4D3E3E;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.5);
            color: #4D3E3E;
            font-family: 'Exposure', Arial, sans-serif;
            box-sizing: border-box;
        }
        
        /* Highlight the active tracking point */
        .tracking-point {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(255, 0, 0, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
        }
        
        @media (max-width: 768px) {
            .display-text {
                font-size: clamp(2rem, 10vw, 15rem);
            }
            
            .controls {
                padding: 10px 15px;
            }
            
            .input-container {
                padding: 10px 15px 20px;
            }
        }
    </style>
</head>
<body>
    <video id="webcam" class="webcam-background" playsinline></video>
    <div class="tracking-point" id="trackingPoint"></div>
    
    <div class="content-wrapper">
        <div class="container">
            <div class="display-container">
                <div id="displayText" class="display-text"></div>
            </div>
        </div>
        <div class="controls">
            <button id="toggleWebcam" class="toggle-button">Hide Webcam</button>
            <div class="slider-container">
                <span class="slider-label">Default:</span>
                <input type="range" min="-100" max="100" value="0" class="slider" id="fontSlider">
                <span class="slider-value" id="sliderValue">0</span>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="typeInput" placeholder="Type something here..." autofocus>
        </div>
    </div>

    <script>
        const typeInput = document.getElementById('typeInput');
        const displayText = document.getElementById('displayText');
        const fontSlider = document.getElementById('fontSlider');
        const sliderValue = document.getElementById('sliderValue');
        const video = document.getElementById('webcam');
        const trackingPoint = document.getElementById('trackingPoint');
        const toggleWebcamBtn = document.getElementById('toggleWebcam');
        
        let handLandmarks = null;
        let letterElements = [];
        let defaultExpo = 0;
        let webcamVisible = true;
        
        // Toggle webcam visibility
        toggleWebcamBtn.addEventListener('click', function() {
            webcamVisible = !webcamVisible;
            video.style.opacity = webcamVisible ? "0.7" : "0";
            toggleWebcamBtn.textContent = webcamVisible ? "Hide Webcam" : "Show Webcam";
        });
        
        // Initialize webcam and hand tracking
        function initializeHandTracking() {
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults(onHandResults);
            
            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({image: video});
                },
                width: 1280,
                height: 720
            });
            
            camera.start();
        }
        
        // Handle hand tracking results
        function onHandResults(results) {
            handLandmarks = results.multiHandLandmarks && results.multiHandLandmarks.length > 0 
                ? results.multiHandLandmarks[0] : null;
            
            // Show tracking point when hand is detected
            if (handLandmarks) {
                const indexFinger = handLandmarks[8]; // Index finger tip
                
                // Mirror the X coordinate to match the mirrored video
                const mirroredX = 1 - indexFinger.x;
                
                // Position the tracking point
                trackingPoint.style.display = 'block';
                trackingPoint.style.left = `${mirroredX * 100}%`;
                trackingPoint.style.top = `${indexFinger.y * 100}%`;
            } else {
                trackingPoint.style.display = 'none';
            }
            
            updateLetterExposure();
        }
        
        // Update display text when user types
        typeInput.addEventListener('input', function() {
            // Create letter spans for individual control
            displayText.innerHTML = '';
            letterElements = [];
            
            Array.from(this.value).forEach(char => {
                const letterSpan = document.createElement('span');
                letterSpan.className = 'letter';
                letterSpan.textContent = char;
                letterSpan.style.fontVariationSettings = `'EXPO' ${defaultExpo}`;
                displayText.appendChild(letterSpan);
                letterElements.push(letterSpan);
            });
            
            // Adjust font size based on text length
            if (this.value.length > 10) {
                displayText.style.fontSize = 'clamp(2rem, 9vw, 12rem)';
            } else if (this.value.length > 5) {
                displayText.style.fontSize = 'clamp(2.5rem, 12vw, 15rem)';
            } else {
                displayText.style.fontSize = 'clamp(3rem, 15vw, 20rem)';
            }
            
            updateLetterExposure();
        });
        
        // Update default exposure setting with slider
        fontSlider.addEventListener('input', function() {
            defaultExpo = parseInt(this.value);
            sliderValue.textContent = defaultExpo;
            
            // Update input font
            typeInput.style.fontVariationSettings = `'EXPO' ${defaultExpo}`;
            
            // Update all letters with default + proximity value
            updateLetterExposure();
        });
        
        // Calculate distance between hand and letter position
        function calculateHandProximity(letterIndex) {
            if (!handLandmarks) return 0;
            
            // Use index finger tip (landmark 8)
            const indexFinger = handLandmarks[8];
            
            // Mirror the X coordinate to match the mirrored video
            const mirroredX = 1 - indexFinger.x;
            
            // Calculate position in viewport coordinates
            const handX = mirroredX * window.innerWidth;
            const handY = indexFinger.y * window.innerHeight;
            
            // Get letter position
            const letter = letterElements[letterIndex];
            if (!letter) return 0;
            
            const letterRect = letter.getBoundingClientRect();
            const letterX = letterRect.left + letterRect.width / 2;
            const letterY = letterRect.top + letterRect.height / 2;
            
            // Calculate distance
            const dx = handX - letterX;
            const dy = handY - letterY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Calculate distance as percentage of screen diagonal
            const screenDiagonal = Math.sqrt(
                window.innerWidth * window.innerWidth + 
                window.innerHeight * window.innerHeight
            );
            
            // Normalize and invert (closer = higher value)
            // Reducing the divisor makes the effect more sensitive to distance
            const normalizedDistance = 1 - Math.min(distance / (screenDiagonal * 0.2), 1);
            
            // Return scaled proximity value
            return Math.floor(normalizedDistance * 200) - 100;
        }
        
        // Update each letter's exposure based on hand proximity
        function updateLetterExposure() {
            letterElements.forEach((letter, index) => {
                const proximityValue = calculateHandProximity(index);
                const exposureValue = Math.max(-100, Math.min(100, defaultExpo + proximityValue));
                letter.style.fontVariationSettings = `'EXPO' ${exposureValue}`;
            });
        }
        
        // Handle window resize
        window.addEventListener('resize', function() {
            // Recalculate letter exposure on resize
            updateLetterExposure();
        });
        
        // Initialize
        initializeHandTracking();
        
        // Request camera permission
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            })
            .catch(function(error) {
                console.error("Camera error: ", error);
                alert("Please allow camera access to enable hand tracking features");
            });
        } else {
            alert("Your browser doesn't support webcam access");
        }
        
        // Update letter exposure on animation frame
        function animate() {
            updateLetterExposure();
            requestAnimationFrame(animate);
        }
        
        requestAnimationFrame(animate);
    </script>
</body>
</html>
