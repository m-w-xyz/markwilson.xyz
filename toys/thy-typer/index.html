<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Typography</title>
    <style>
        @font-face {
            font-family: 'CourtRegular';
            src: url('../../assets/fonts/court-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 200%;
            max-height: 100vh;
            width: auto;
            height: auto;
            display: block;
        }
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 16px 20px;
            min-width: 280px;
            max-width: 420px;
        }
        .ui-panel label {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #text-input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            background: rgb(40, 40, 40);
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        @media (max-width: 768px) {
            .ui-panel {
                left: 15px;
                right: 15px;
                bottom: 15px;
                min-width: auto;
                max-width: none;
            }
            #text-input {
                padding: 12px;
                font-size: 16px; /* Prevents zoom on iOS */
                min-height: 44px; /* Touch-friendly */
            }
            canvas {
                max-width: 100%;
                max-height: 100vh;
            }
        }
        @media (max-width: 480px) {
            .ui-panel {
                padding: 12px 16px;
            }
            #text-input {
                font-size: 16px;
            }
        }
        #text-input::placeholder {
            color: rgba(190, 190, 190, 0.5);
        }
        #text-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgb(50, 50, 50);
        }
        .typeface-credit {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
            pointer-events: auto;
        }
        .typeface-credit a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .typeface-credit a:hover {
            color: rgba(255, 255, 255, 1);
        }
        /* Hide canvas until custom font has loaded to prevent FOUT */
        body.fonts-loading #canvas-container {
            opacity: 0;
        }
        body #canvas-container {
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body class="fonts-loading">
    <div id="canvas-container">
        <canvas id="canvas" width="1080" height="1350"></canvas>
    </div>
    <div class="ui-panel">
        <label for="text-input">Phrase</label>
        <input type="text" id="text-input" placeholder="Bestow thy phrase unto thee">
    </div>
    <div class="typeface-credit">
        Typeface by <a href="https://www.instagram.com/deskofsonia/" target="_blank" rel="noopener noreferrer">Desk of Sonia</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
