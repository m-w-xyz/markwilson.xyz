<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shape Text Grid</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .controls {
        position: fixed;
        top: 0;
        right: 0;
        height: auto;
        max-height: 100vh;
        width: 260px;
        padding: 0.75rem 0.75rem 1rem;
        background: #1a1a1a;
        color: #fff;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        z-index: 20;
        font-size: 12px;
        transition: transform 0.3s ease-in-out;
        overflow-y: auto;
      }

      .controls.collapsed {
        transform: translateX(258px);
      }

      #toggle-panel {
        position: fixed;
        top: 1px;
        right: 260px;
        width: 32px;
        height: 32px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 0;
        font-size: 14px;
        cursor: pointer;
        z-index: 21;
        transition: background 0.2s, right 0.3s ease-in-out;
      }

      #toggle-panel:hover {
        background: #2a2a2a;
      }

      .button-row {
        display: flex;
        gap: 0.25rem;
        margin-bottom: 0.25rem;
      }

      .controls button {
        flex: 1;
        padding: 3px 6px;
        border: none;
        border-radius: 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: #1b1b1b;
        color: #eee;
        cursor: pointer;
        white-space: nowrap;
      }

      .controls button:hover {
        background: #2a2a2a;
      }

      .controls button.small {
        flex: 0 0 auto;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .controls label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #ccc;
      }

      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .controls button.toggle-on {
        background: #f5f5f5;
        color: #000;
      }

      .controls input[type="text"] {
        padding: 0.5rem 0.75rem;
        border-radius: 0;
        border: none;
        background: #111;
        color: #f5f5f5;
        font: inherit;
        outline: none;
      }

      .controls input[type="text"]::placeholder {
        color: #666;
      }

      .slider-row {
        position: relative;
        height: 18px;
        background: #050505;
        overflow: hidden;
        cursor: pointer;
      }

      .controls input[type="range"] {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }

      .controls input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 0;
        height: 0;
      }

      .slider-value {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        min-width: 40px;
        background: #3a3a3a;
        text-align: center;
        padding: 2px 4px;
        font-size: 11px;
        color: #f5f5f5;
        pointer-events: none;
        border-radius: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        left: 0;
      }

      .motion-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
      }

      .motion-buttons .motion-btn {
        flex: 1 1 calc(50% - 0.125rem);
        min-width: 0;
      }

      .motion-buttons .motion-btn-none {
        flex: 1 1 100%;
        text-align: center;
      }

      .canvas-wrap {
        position: relative;
        flex: 1;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      @media (max-width: 600px) {
        .controls {
          width: 98vw;
        }
        .controls.collapsed {
          transform: translateX(90vw);
        }
      }
    </style>
  </head>
  <body>
    <button type="button" id="toggle-panel" aria-label="Toggle panel">✕</button>
    <div class="controls" id="controlsPanel">
      <div class="control-group">
        <div class="label-row">
          <label for="textInput">Text</label>
          <button id="fullGridBtn" class="small">Full grid</button>
          <button id="webcamBtn" class="small">Webcam</button>
        </div>
        <input
          id="textInput"
          type="text"
          maxlength="40"
          spellcheck="false"
          autocomplete="off"
          placeholder="Type here…"
        />
      </div>

      <div class="control-group">
        <label for="spacingSlider">
          Grid spacing:
        </label>
        <div class="slider-row">
          <input
            id="spacingSlider"
            type="range"
            min="0"
            max="30"
            step="1"
            value="0"
          />
          <div class="slider-value" id="spacingValue">0</div>
        </div>
      </div>

      <div class="control-group">
        <label for="sizeSlider">Shape size</label>
        <div class="slider-row">
          <input
            id="sizeSlider"
            type="range"
            min="8"
            max="40"
            step="1"
            value="15"
          />
          <div class="slider-value" id="sizeValue">15</div>
        </div>
      </div>

      <div class="control-group">
        <label for="speedSlider">
          Tide speed
        </label>
        <div class="slider-row">
          <input
            id="speedSlider"
            type="range"
            min="0"
            max="200"
            step="1"
            value="50"
          />
          <div class="slider-value" id="speedValue">0.50</div>
        </div>
      </div>

      <div class="control-group">
        <label for="frequencySlider">Wave spacing</label>
        <div class="slider-row">
          <input
            id="frequencySlider"
            type="range"
            min="5"
            max="200"
            step="1"
            value="20"
          />
          <div class="slider-value" id="frequencyValue">0.20</div>
        </div>
      </div>

      <div class="control-group">
        <label for="angleSlider">Angle</label>
        <div class="slider-row">
          <input
            id="angleSlider"
            type="range"
            min="0"
            max="360"
            step="1"
            value="0"
          />
          <div class="slider-value" id="angleValue">0°</div>
        </div>
      </div>

      <div class="control-group">
        <label>Motion pattern</label>
        <div class="motion-buttons">
          <button type="button" class="motion-btn small" data-motion="swell">Swell</button>
          <button type="button" class="motion-btn small" data-motion="crest">Crest</button>
          <button type="button" class="motion-btn small" data-motion="surge">Surge</button>
          <button type="button" class="motion-btn small" data-motion="storm">Storm</button>
          <button type="button" class="motion-btn motion-btn-none small" data-motion="none">None</button>
        </div>
      </div>
      <div class="button-row">
        <button id="pauseBtn" class="small">Pause</button>
        <button id="resetBtn" class="small">Reset</button>
        <button id="randomiseBtn" class="small">Randomise</button>
      </div>
      <div class="button-row">
        <button id="downloadBtn" class="small">Save PNG</button>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const input = document.getElementById("textInput");
      const spacingSlider = document.getElementById("spacingSlider");
      const sizeSlider = document.getElementById("sizeSlider");
      const speedSlider = document.getElementById("speedSlider");
      const motionBtns = document.querySelectorAll(".motion-btn");
      const frequencySlider = document.getElementById("frequencySlider");
      const angleSlider = document.getElementById("angleSlider");
      const fullGridBtn = document.getElementById("fullGridBtn");
      const webcamBtn = document.getElementById("webcamBtn");
      const spacingValue = document.getElementById("spacingValue");
      const sizeValue = document.getElementById("sizeValue");
      const speedValue = document.getElementById("speedValue");
      const frequencyValue = document.getElementById("frequencyValue");
      const angleValue = document.getElementById("angleValue");
      const pauseBtn = document.getElementById("pauseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const randomiseBtn = document.getElementById("randomiseBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const controlsPanel = document.getElementById("controlsPanel");
      const togglePanelBtn = document.getElementById("toggle-panel");

      // Grid + shape configuration (controlled by UI)
      let tileSize = 15; // px (rendered size of the shape)
      let gapX = 0; // horizontal spacing
      let gapY = 0; // vertical spacing
      let tideSpeed = 0.5; // animation speed multiplier
      let motionPattern = "swell";
      let waveFrequency = 0.2; // spatial frequency factor
      let angleDeg = 0; // motion angle in degrees
      let angleRad = 0; // cached radians
      let fullGrid = false; // when true, ignore text mask
      let motionPatternBeforeWebcam = "swell"; // restored when webcam turns off

      // Webcam brightness + motion masks
      const webcamVideo = document.createElement("video");
      webcamVideo.autoplay = true;
      webcamVideo.playsInline = true;
      webcamVideo.muted = true;
      webcamVideo.style.display = "none";
      document.body.appendChild(webcamVideo);

      const webcamCanvas = document.createElement("canvas");
      const webcamCtx = webcamCanvas.getContext("2d");
      let webcamData = null;
      let webcamMotion = null; // per-pixel motion energy
      let prevWebcamData = null;
      let webcamStream = null;
      let webcamActive = false;

      // Hand path: accumulates where the hand has been, decays slowly (trail effect)
      let handPathBuffer = null;
      let handPathSmooth = null; // temporal smoothing to reduce jitter
      const HAND_PATH_DECAY = 0.97;
      const HAND_PATH_ADD = 0.35;
      const HAND_PATH_MAX = 1.2;
      const HAND_PATH_SMOOTH = 0.18; // lower = smoother, slower response
      const HAND_DISPLACE = 90;
      const HAND_SCALE_BOOST = 3.5;

      // Simple fractal-style noise for "Storm" pattern
      function stormNoise(x, y, t) {
        let value = 0;
        let amplitude = 1;
        let frequency = 1;
        let norm = 0;

        for (let octave = 0; octave < 3; octave++) {
          value +=
            amplitude *
            Math.sin((x * 0.03 * frequency + t * 1.3 * frequency)) *
            Math.cos((y * 0.04 * frequency - t * 1.7 * frequency));
          norm += amplitude;
          amplitude *= 0.5;
          frequency *= 2;
        }

        return value / norm; // roughly -1..1
      }

      const shapeImg = new Image();
      // Load the SVG from the shared assets folder
      shapeImg.src = "assets/img/shape1.svg";

      let shapeReady = false;
      shapeImg.onload = () => {
        shapeReady = true;
      };
      // If the SVG fails to load, fall back to drawing the shape with canvas
      shapeImg.onerror = () => {
        shapeReady = false;
      };

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function wrapTextToLines(text, maxChars) {
        if (!text) return [];
        const clean = text.trim();
        if (!clean) return [];

        const words = clean.split(/\s+/);
        const lines = [];
        let currentLine = "";

        for (const word of words) {
          const wouldBe = currentLine ? currentLine + " " + word : word;
          if (currentLine.length === 0) {
            currentLine = word;
          } else if (wouldBe.length <= maxChars) {
            currentLine = wouldBe;
          } else {
            lines.push(currentLine);
            currentLine = word;
          }
        }
        if (currentLine) lines.push(currentLine);
        return lines;
      }

      function createTextMaskCanvas(text, width, height) {
        const offCanvas = document.createElement("canvas");
        offCanvas.width = width;
        offCanvas.height = height;
        const offCtx = offCanvas.getContext("2d");

        // Start from a transparent background so only text has alpha
        offCtx.clearRect(0, 0, width, height);

        if (!text) {
          return offCanvas;
        }

        const lines = wrapTextToLines(text, 7); // max 7 chars per line, break at word boundaries
        if (!lines.length) return offCanvas;

        // Leading: line height = 1.0 * fontSize (narrow, lines tight)
        const leadingRatio = 1.0;
        const getLineHeight = (fs) => fs * leadingRatio;

        // Find an appropriate font size that fits the canvas width/height
        const maxHeight = height * 0.85;
        let fontSize = maxHeight;
        offCtx.textAlign = "center";
        offCtx.textBaseline = "top";

        // Simple down-scaling loop to fit width and height for all lines
        while (fontSize > 10) {
          offCtx.font = `bold ${fontSize}px Arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;

          let maxLineWidth = 0;
          for (const line of lines) {
            const metrics = offCtx.measureText(line);
            maxLineWidth = Math.max(maxLineWidth, metrics.width);
          }

          const lineHeight = getLineHeight(fontSize);
          const totalTextHeight = (lines.length - 1) * lineHeight + fontSize;

          if (maxLineWidth <= width * 0.9 && totalTextHeight <= maxHeight) {
            break;
          }
          fontSize -= 2;
        }

        const lineHeight = getLineHeight(fontSize);
        const totalTextHeight = (lines.length - 1) * lineHeight + fontSize;
        // Nudge down so visual center matches: "top" baseline leaves extra space above cap height
        const verticalNudge = fontSize * 0.15;
        const startY = height / 2 - totalTextHeight / 2 + verticalNudge;

        offCtx.fillStyle = "white";
        lines.forEach((line, index) => {
          offCtx.fillText(line, width / 2, startY + index * lineHeight);
        });
        return offCanvas;
      }

      // Draw a fallback semicircle shape that matches the reference screenshots
      function drawFallbackShape(context, x, y, size) {
        const radius = size / 2;
        const cx = x + radius;
        const cy = y + radius;
        context.fillStyle = "white";
        context.beginPath();
        context.arc(cx, cy, radius, Math.PI, 0, false);
        context.closePath();
        context.fill();
      }

      let accumulatedTime = 0;
      let lastFrameTimestamp = 0;
      let isPaused = false;

      async function toggleWebcam() {
        if (webcamActive) {
          if (webcamStream) {
            webcamStream.getTracks().forEach((track) => track.stop());
          }
          webcamStream = null;
          webcamActive = false;
          webcamData = null;
          webcamBtn.textContent = "Webcam";
          fullGrid = false;
          fullGridBtn.classList.remove("toggle-on");
          motionPattern = motionPatternBeforeWebcam;
          setMotionActive(motionPattern);
          render(accumulatedTime);
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert("Webcam not supported in this browser.");
          return;
        }
        if (!window.isSecureContext) {
          alert("Webcam requires a secure page (HTTPS or localhost). Run a local server (e.g. npx serve .) and open http://localhost:3000/tauranga-test.html");
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 640 },
              height: { ideal: 480 },
            },
            audio: false,
          });
          webcamStream = stream;
          webcamVideo.srcObject = stream;
          await webcamVideo.play();
          webcamActive = true;
          webcamBtn.textContent = "Webcam On";
          motionPatternBeforeWebcam = motionPattern;
          motionPattern = "none";
          setMotionActive("none");
          fullGrid = true;
          fullGridBtn.classList.add("toggle-on");
          render(accumulatedTime);
        } catch (e) {
          const msg = e.name === "NotAllowedError" || e.name === "PermissionDeniedError"
            ? "Camera permission denied. Allow camera access and try again."
            : e.name === "NotFoundError"
            ? "No camera found."
            : "Could not access camera: " + (e.message || e.name);
          alert(msg);
        }
      }

      function render(time = 0) {
        const t = time * tideSpeed;

        const rect = canvas.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const w2 = width >> 1;
        const h2 = height >> 1;

        if (width === 0 || height === 0) return;

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, width, height);

        if (webcamActive && webcamVideo.readyState >= 2) {
          webcamCanvas.width = w2;
          webcamCanvas.height = h2;

          const vw = webcamVideo.videoWidth || 1;
          const vh = webcamVideo.videoHeight || 1;
          const scale = Math.min(w2 / vw, h2 / vh);
          const dw = vw * scale;
          const dh = vh * scale;
          const dx = (w2 - dw) / 2;
          const dy = (h2 - dh) / 2;

          webcamCtx.save();
          webcamCtx.translate(w2, 0);
          webcamCtx.scale(-1, 1);
          webcamCtx.fillStyle = "black";
          webcamCtx.fillRect(0, 0, w2, h2);
          webcamCtx.drawImage(webcamVideo, 0, 0, vw, vh, dx, dy, dw, dh);
          webcamCtx.restore();

          const frame = webcamCtx.getImageData(0, 0, w2, h2);
          const data = frame.data;
          const pixelCount = w2 * h2;

          if (prevWebcamData && prevWebcamData.length === data.length) {
            if (!webcamMotion || webcamMotion.length !== pixelCount) {
              webcamMotion = new Uint8ClampedArray(pixelCount);
            }
            for (let i = 0, p = 0; i < data.length; i += 4, p++) {
              const prevL = (prevWebcamData[i] + prevWebcamData[i + 1] + prevWebcamData[i + 2]) / 3;
              const curL = (data[i] + data[i + 1] + data[i + 2]) / 3;
              webcamMotion[p] = Math.min(255, Math.abs(curL - prevL) * 2);
            }
          } else {
            webcamMotion = null;
          }

          prevWebcamData = new Uint8ClampedArray(data);
          webcamData = data;

          if (!handPathBuffer || handPathBuffer.length !== pixelCount) {
            handPathBuffer = new Float32Array(pixelCount);
          }
          for (let p = 0; p < pixelCount; p++) {
            const motionNorm = webcamMotion ? webcamMotion[p] / 255 : 0;
            handPathBuffer[p] = Math.min(HAND_PATH_MAX, handPathBuffer[p] * HAND_PATH_DECAY + motionNorm * HAND_PATH_ADD);
          }
          if (!handPathSmooth || handPathSmooth.length !== pixelCount) {
            handPathSmooth = new Float32Array(pixelCount);
          }
          const smoothAlpha = HAND_PATH_SMOOTH;
          for (let p = 0; p < pixelCount; p++) {
            handPathSmooth[p] = handPathSmooth[p] * (1 - smoothAlpha) + handPathBuffer[p] * smoothAlpha;
          }
        }

        let maskData = null;
        if (!fullGrid) {
          const text = input.value.trim() || "A";
          const maskCanvas = createTextMaskCanvas(text, width, height);
          const maskCtx = maskCanvas.getContext("2d");
          maskData = maskCtx.getImageData(0, 0, width, height).data;
        }

        // Precompute rotated coordinates for motion angle
        const cosA = Math.cos(angleRad);
        const sinA = Math.sin(angleRad);

        // Draw grid of shapes; optionally clip to the text mask
        // Use a slightly softer link between shape size and spacing
        const cellWidth = tileSize + gapX;
        const cellHeight = tileSize + gapY;

        for (let y = gapY; y < height - gapY; y += cellHeight) {
          for (let x = gapX; x < width - gapX; x += cellWidth) {
            const sampleX = Math.round(x + cellWidth / 2);
            const sampleY = Math.round(y + cellHeight / 2);

            if (sampleX < 0 || sampleX >= width || sampleY < 0 || sampleY >= height)
              continue;

            const idx = (sampleY * width + sampleX) * 4;
            const pIdxLo = webcamData ? (Math.min(sampleY >> 1, h2 - 1) * w2 + Math.min(sampleX >> 1, w2 - 1)) | 0 : 0;

            if (!fullGrid && maskData) {
              const alpha = maskData[idx + 3];
              if (alpha <= 16) continue;
            }

            let brightness = 1;
            if (webcamActive && webcamData) {
              const o = pIdxLo * 4;
              const r = webcamData[o];
              const g = webcamData[o + 1];
              const b = webcamData[o + 2];
              brightness = (r + g + b) / (3 * 255);
              if (brightness < 0.05) continue;
            }

            let shimmerBoost = 0;
            if (webcamMotion) {
              const motionValue = webcamMotion[pIdxLo] || 0;
              const motionNorm = motionValue / 255;
              if (motionNorm > 0.1) {
                shimmerBoost =
                  0.2 *
                  motionNorm *
                  (0.5 + 0.5 * Math.sin(time * 8 + x * 0.1 + y * 0.13));
              }
            }

            // Rotate coordinates by angle for motion direction
            const rx = x * cosA - y * sinA;
            const ry = x * sinA + y * cosA;

            // Independent pulsing scale for each cell, with sea-inspired patterns
            let phase;
            switch (motionPattern) {
              case "crest":
                // Slow vertical bands sweeping upward
                phase = t * 0.6 + ry * 0.05 * waveFrequency;
                break;
              case "storm": {
                // Fractal noise choppiness
                const n = stormNoise(rx * waveFrequency, ry * waveFrequency, t * 0.35);
                // Map noise directly into phase domain
                phase = n * Math.PI * 2;
                break;
              }
              case "surge":
                // Faster, choppy waves
                phase =
                  t * 0.8 +
                  Math.sin(rx * 0.06 * waveFrequency) * 0.8 +
                  Math.cos(ry * 0.06 * waveFrequency) * 0.8;
                break;
                case "none":
                  // No motion
                  phase = 0;
                  break;
              case "swell":
              default:
                // Soft rolling tide
                phase = t * 0.9 + (rx * 0.03 + ry * 0.05) * waveFrequency;
                break;
            }

            let scale = 0.5 + 0.5 * Math.sin(phase); // 0..1
            scale *= 0.3 + 0.7 * brightness;
            scale *= 1 + shimmerBoost;

            let pathStrength = 0;
            if (handPathSmooth && webcamActive) {
              pathStrength = handPathSmooth[pIdxLo] || 0;
            }
            const displace = pathStrength * HAND_DISPLACE;
            const angle = Math.atan2(sampleY - height / 2, sampleX - width / 2) + time * 0.3;
            const dispX = displace * Math.cos(angle) * 0.6;
            const dispY = -displace * 0.9 + Math.sin(sampleX * 0.02) * displace * 0.3;
            scale *= 1 + pathStrength * HAND_SCALE_BOOST;

            // Preserve the SVG's native aspect ratio so it never warps
            let drawWidth = tileSize;
            let drawHeight = tileSize;

            if (shapeReady && shapeImg.naturalWidth && shapeImg.naturalHeight) {
              const aspect = shapeImg.naturalWidth / shapeImg.naturalHeight;
              if (aspect >= 1) {
                // Wider than tall: width is the driver
                drawWidth = tileSize;
                drawHeight = tileSize / aspect;
              } else {
                // Taller than wide: height is the driver
                drawHeight = tileSize;
                drawWidth = tileSize * aspect;
              }
            }

            const baseX = x + (cellWidth - drawWidth) / 2;
            const baseY = y + (cellHeight - drawHeight) / 2;
            let anchorX = baseX + drawWidth / 2;
            let anchorY = baseY + drawHeight;
            anchorX += dispX;
            anchorY += dispY;

            ctx.save();
            ctx.translate(anchorX, anchorY);
            ctx.scale(scale, scale);

            const localX = -drawWidth / 2;
            const localY = -drawHeight;

            if (shapeReady) {
              ctx.drawImage(shapeImg, localX, localY, drawWidth, drawHeight);
            } else {
              drawFallbackShape(ctx, localX, localY, tileSize);
            }

            ctx.restore();
          }
        }
      }

      function updateSliderThumb(inputEl, valueEl) {
        const min = Number(inputEl.min);
        const max = Number(inputEl.max);
        const val = Number(inputEl.value);
        const row = inputEl.parentElement;
        const rowWidth = row.clientWidth;
        const thumbWidth = 40;

        if (!rowWidth) return;

        const ratio = max > min ? (val - min) / (max - min) : 0;
        const clamped = Math.min(1, Math.max(0, ratio));
        const available = rowWidth - thumbWidth;
        const offset = available * clamped;

        valueEl.style.left = `${offset}px`;
      }

      // Make sliders respond smoothly to click + drag anywhere on the row
      function attachSmoothSlider(inputEl, valueEl) {
        let isDragging = false;

        const applyPointerPosition = (clientX) => {
          const rect = inputEl.parentElement.getBoundingClientRect();
          const min = Number(inputEl.min);
          const max = Number(inputEl.max);
          const step = Number(inputEl.step) || 1;

          if (!rect.width || max <= min) return;

          const ratio = (clientX - rect.left) / rect.width;
          const clamped = Math.min(1, Math.max(0, ratio));
          const rawValue = min + clamped * (max - min);
          const stepped =
            Math.round((rawValue - min) / step) * step + min;

          inputEl.value = String(
            Math.min(max, Math.max(min, stepped))
          );
          // Reuse existing wiring for responding to slider changes
          inputEl.dispatchEvent(new Event("input", { bubbles: true }));
        };

        inputEl.addEventListener("pointerdown", (e) => {
          isDragging = true;
          inputEl.setPointerCapture(e.pointerId);
          e.preventDefault();
          applyPointerPosition(e.clientX);
        });

        inputEl.addEventListener("pointermove", (e) => {
          if (!isDragging) return;
          e.preventDefault();
          applyPointerPosition(e.clientX);
        });

        const stopDrag = (e) => {
          if (!isDragging) return;
          isDragging = false;
          try {
            inputEl.releasePointerCapture(e.pointerId);
          } catch (_) {
            // ignore if pointer not captured
          }
        };

        inputEl.addEventListener("pointerup", stopDrag);
        inputEl.addEventListener("pointercancel", stopDrag);
      }

      function updateFromControls() {
        gapX = gapY = Number(spacingSlider.value);
        tileSize = Number(sizeSlider.value);
        tideSpeed = Number(speedSlider.value) / 100 || 0;
        // motionPattern set by motion buttons
        waveFrequency = Number(frequencySlider.value) / 100 || 0.2;
        angleDeg = Number(angleSlider.value) || 0;
        angleRad = (angleDeg * Math.PI) / 180;
        spacingValue.textContent = String(gapX);
        sizeValue.textContent = String(tileSize);
        speedValue.textContent = tideSpeed.toFixed(2);
        frequencyValue.textContent = waveFrequency.toFixed(2);
        angleValue.textContent = `${angleDeg}°`;

        updateSliderThumb(spacingSlider, spacingValue);
        updateSliderThumb(sizeSlider, sizeValue);
        updateSliderThumb(speedSlider, speedValue);
        updateSliderThumb(frequencySlider, frequencyValue);
        updateSliderThumb(angleSlider, angleValue);
      }

      function animate(timestamp) {
        const seconds = timestamp / 1000;

        if (!lastFrameTimestamp) {
          lastFrameTimestamp = seconds;
        }

        const delta = seconds - lastFrameTimestamp;
        lastFrameTimestamp = seconds;

        if (!isPaused) {
          accumulatedTime += delta;
        }

        render(accumulatedTime);
        requestAnimationFrame(animate);
      }

      // Event wiring
      input.addEventListener("input", () => {
        render(accumulatedTime);
      });

      window.addEventListener("resize", () => {
        resizeCanvas();
        updateToggleButton();
        render(accumulatedTime);
      });

      spacingSlider.addEventListener("input", () => {
        updateFromControls();
        render(accumulatedTime);
      });

      sizeSlider.addEventListener("input", () => {
        updateFromControls();
        render(accumulatedTime);
      });

      speedSlider.addEventListener("input", () => {
        updateFromControls();
        render(accumulatedTime);
      });

      function setMotionActive(value) {
        motionBtns.forEach((btn) => {
          btn.classList.toggle("toggle-on", btn.dataset.motion === value);
        });
      }

      motionBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          motionPattern = btn.dataset.motion;
          setMotionActive(motionPattern);
          render(accumulatedTime);
        });
      });

      frequencySlider.addEventListener("input", () => {
        updateFromControls();
        render(accumulatedTime);
      });

      angleSlider.addEventListener("input", () => {
        updateFromControls();
        render(accumulatedTime);
      });

      fullGridBtn.addEventListener("click", () => {
        fullGrid = !fullGrid;
        fullGridBtn.classList.toggle("toggle-on", fullGrid);
        render(accumulatedTime);
      });

      webcamBtn.addEventListener("click", () => {
        toggleWebcam();
      });

      pauseBtn.addEventListener("click", () => {
        isPaused = !isPaused;
        pauseBtn.textContent = isPaused ? "Play" : "Pause";
      });

      function updateToggleButton() {
        const isCollapsed = controlsPanel.classList.contains("collapsed");
        togglePanelBtn.textContent = isCollapsed ? "☰" : "✕";
        const panelWidth = window.innerWidth <= 600 ? "98vw" : "260px";
        togglePanelBtn.style.right = isCollapsed ? "2px" : panelWidth;
      }

      togglePanelBtn.addEventListener("click", () => {
        controlsPanel.classList.toggle("collapsed");
        updateToggleButton();
      });

      updateToggleButton();

      const randomTextOptions = [
        "TAURANGA", "KA PAI", "KIA ORA", "CHUR", "SHAKA BRAH", "EASY", "TOGS", "NOT EVEN", "BEACH BUM",
        "NICE WAVE", "TU MEKE", "CHOICE", "MEAN", "SURF'S UP", "HANG LOOSE", "BIG AIR", "KEEN AS", "MAURI ORA",
        "SWEEEET", "HARDOUT", "BOOM", "CHEHOOO", "RIP IT", "CUZZIE", "SUP", "HOWSIT?", "THE MOUNT"
      ];

      resetBtn.addEventListener("click", () => {
        input.value = randomTextOptions[Math.floor(Math.random() * randomTextOptions.length)];
        tileSize = 15;
        gapX = gapY = 0;
        tideSpeed = 0.5;
        motionPattern = "swell";
        waveFrequency = 0.2;
        angleDeg = 0;
        fullGrid = false;
        spacingSlider.value = String(gapX);
        sizeSlider.value = String(tileSize);
        speedSlider.value = String(tideSpeed * 100);
        frequencySlider.value = String(waveFrequency * 100);
        angleSlider.value = String(angleDeg);
        setMotionActive(motionPattern);
        fullGridBtn.classList.remove("toggle-on");
        if (webcamActive) {
          toggleWebcam();
        }
        accumulatedTime = 0;
        lastFrameTimestamp = 0;
        updateFromControls();
        render(accumulatedTime);
      });

      randomiseBtn.addEventListener("click", () => {
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const preferNarrow = Math.random() < 10 / 11; // 10x more likely: narrow range
        const spacing = preferNarrow ? randInt(0, 10) : randInt(0, 30);
        const size = preferNarrow ? randInt(8, 20) : randInt(8, 40);
        input.value = randomTextOptions[randInt(0, randomTextOptions.length - 1)];
        spacingSlider.value = String(spacing);
        sizeSlider.value = String(size);
        speedSlider.value = String(randInt(0, 200));
        frequencySlider.value = String(randInt(5, 200));
        angleSlider.value = String(randInt(0, 360));
        const motions = ["swell", "crest", "surge", "storm", "none"];
        motionPattern = motions[randInt(0, motions.length - 1)];
        setMotionActive(motionPattern);
        updateFromControls();
        render(accumulatedTime);
      });

      downloadBtn.addEventListener("click", () => {
        const rect = canvas.getBoundingClientRect();
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = rect.width;
        exportCanvas.height = rect.height;
        const exportCtx = exportCanvas.getContext("2d");
        exportCtx.drawImage(canvas, 0, 0, exportCanvas.width, exportCanvas.height);
        exportCanvas.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "tide-grid.png";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
      });

      // Initial setup
      window.addEventListener("load", () => {
        resizeCanvas();
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        input.value = randomTextOptions[randInt(0, randomTextOptions.length - 1)];
        setMotionActive(motionPattern);
        spacingSlider.value = String(gapX);
        sizeSlider.value = String(tileSize);
        speedSlider.value = String(tideSpeed * 100);
        frequencySlider.value = String(waveFrequency * 100);
        angleSlider.value = String(angleDeg);
        updateFromControls();
        attachSmoothSlider(spacingSlider, spacingValue);
        attachSmoothSlider(sizeSlider, sizeValue);
        attachSmoothSlider(speedSlider, speedValue);
        attachSmoothSlider(frequencySlider, frequencyValue);
        attachSmoothSlider(angleSlider, angleValue);
        requestAnimationFrame(animate);
      });
    </script>
  </body>
</html>
